apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
data:
  config.yaml: |
    receivers:
      # OTLP receiver for application metrics and traces
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

      # NOTE: Log collection in K8s is handled by the otel-collector-logs DaemonSet
      # (see otel-collector-logs.yaml) which reads CRI-format container logs from
      # /var/log/pods/ on each node and pushes them to Loki. This Deployment only
      # handles OTLP-pushed metrics, traces, and any OTLP-pushed logs.

    processors:
      # Batch for efficiency
      batch:
        timeout: 5s
        send_batch_size: 1000

      # Memory limiter for stability
      memory_limiter:
        check_interval: 1s
        limit_mib: 180
        spike_limit_mib: 50

      # Extract log attributes for Loki labels
      attributes/logs:
        actions:
          - key: level
            from_attribute: body.level
            action: upsert
          - key: service
            from_attribute: body.logger
            action: upsert
          - key: service_name
            from_attribute: body.service_name
            action: upsert
          - key: correlation_id
            from_attribute: body.correlation_id
            action: upsert
          - key: trip_id
            from_attribute: body.trip_id
            action: upsert

      # Copy service_name attribute to service.name resource attribute
      transform/logs:
        log_statements:
          - context: log
            statements:
              - set(resource.attributes["service.name"], attributes["service_name"]) where attributes["service_name"] != nil

      # Loki label hints (tells loki exporter which attributes to promote to labels)
      attributes/loki_hints:
        actions:
          - key: loki.attribute.labels
            value: level,service,service_name,container_id
            action: insert

      resource/loki_hints:
        attributes:
          - key: loki.resource.labels
            value: service.name,deployment.environment
            action: insert

      # Add resource attributes
      resource:
        attributes:
          - key: deployment.environment
            value: production
            action: upsert

    exporters:
      # Prometheus remote write for metrics
      prometheusremotewrite:
        endpoint: http://prometheus:9090/api/v1/write
        resource_to_telemetry_conversion:
          enabled: true

      # Loki exporter for logs (if any logs arrive via OTLP)
      loki:
        endpoint: http://loki:3100/loki/api/v1/push

      # OTLP exporter to Tempo for traces
      otlp/tempo:
        endpoint: tempo:4317
        tls:
          insecure: true

    extensions:
      health_check:
        endpoint: 0.0.0.0:13133

    service:
      extensions: [health_check]
      pipelines:
        # Metrics pipeline: OTLP -> Prometheus
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, batch, resource]
          exporters: [prometheusremotewrite]

        # Logs pipeline: OTLP -> Loki
        logs:
          receivers: [otlp]
          processors: [memory_limiter, attributes/logs, transform/logs, resource, resource/loki_hints, attributes/loki_hints, batch]
          exporters: [loki]

        # Traces pipeline: OTLP -> Tempo
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch, resource]
          exporters: [otlp/tempo]

      telemetry:
        logs:
          level: info
        metrics:
          address: 0.0.0.0:8888
