apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# DBT_RUNNER=duckdb overlay: self-contained production target with Hive Metastore.
# ArgoCD path: infrastructure/kubernetes/overlays/production-duckdb
# Trino uses a local Hive Metastore (thrift) backed by RDS PostgreSQL.

resources:
  # Core Services
  - ../../manifests/kafka.yaml
  - ../../manifests/schema-registry.yaml
  - ../../manifests/redis.yaml
  - ../../manifests/osrm.yaml
  - ../../manifests/simulation.yaml
  - ../../manifests/stream-processor.yaml
  - ../../manifests/performance-controller.yaml
  - ../../manifests/control-panel.yaml

  # Data Pipeline
  - ../../manifests/bronze-ingestion.yaml
  - ../../manifests/bronze-init.yaml

  # Trino catalog ConfigMaps (one per runner)
  - ../../manifests/trino.yaml
  - ../../manifests/trino-glue-catalog.yaml

  - ../../manifests/airflow-webserver.yaml
  - ../../manifests/airflow-scheduler.yaml
  - ../../manifests/airflow-dags.yaml

  # Monitoring
  - ../../manifests/prometheus.yaml
  - ../../manifests/grafana.yaml
  - ../../manifests/loki.yaml
  - ../../manifests/tempo.yaml
  - ../../manifests/otel-collector.yaml
  - ../../manifests/otel-collector-logs.yaml

  # ConfigMaps (patched by component)
  - ../../manifests/configmap-core.yaml
  - ../../manifests/configmap-data-pipeline.yaml

  # Hive Metastore (required for dbt duckdb runner — Trino catalog uses thrift URI)
  - ../../manifests/hive-metastore.yaml
  - ../../manifests/postgres-metastore.yaml
  - ../../manifests/pvc-postgres-metastore.yaml

components:
  - ../../components/aws-production

namespace: rideshare-prod

images:
  - name: rideshare-hive-metastore
    newName: 962393283188.dkr.ecr.us-east-1.amazonaws.com/rideshare/hive-metastore
    newTag: 020fdd4dcf68b288dd86e97f5e868d3f5f9d0dcf

patches:
  # Hive Metastore: RDS endpoint, remove MinIO initContainer and credentials
  - path: hive-metastore-patch.yaml
    target:
      kind: Deployment
      name: hive-metastore

  # Hive site config: AWS S3 via IRSA instead of MinIO endpoint and credentials
  - path: hive-site-config-patch.yaml
    target:
      kind: ConfigMap
      name: hive-site-config

  # Hive Metastore: set imagePullPolicy to IfNotPresent for ECR image
  - patch: '[{"op": "replace", "path": "/spec/template/spec/containers/0/imagePullPolicy", "value": "IfNotPresent"}]'
    target:
      kind: Deployment
      labelSelector: app in (hive-metastore)

  # Hive Metastore: bind to its IRSA ServiceAccount
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: placeholder
      spec:
        template:
          spec:
            serviceAccountName: hive-metastore
    target:
      kind: Deployment
      name: hive-metastore

  # Trino catalog: Hive Metastore thrift URI (duckdb runner)
  - path: trino-catalog-patch.yaml
    target:
      kind: ConfigMap
      name: trino-config
