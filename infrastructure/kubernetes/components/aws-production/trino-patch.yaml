# Production patch: Remove MinIO dependencies from Trino Deployment
# - Removes wait-for-minio initContainer (no MinIO in production)
# - Simplifies setup-config to copy catalog file directly (no sed substitution)
# - Removes MinIO credential env vars from setup-config
# - Adds AWS_REGION for S3 access via IRSA
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trino
spec:
  template:
    spec:
      initContainers:
        - name: wait-for-minio
          $patch: delete
        - name: setup-config
          command:
            - sh
            - -c
            - |
              cp /config-source/config.properties /etc/trino/config.properties
              cp /config-source/jvm.config /etc/trino/jvm.config
              cp /config-source/node.properties /etc/trino/node.properties
              cp /config-source/password-authenticator.properties /etc/trino/password-authenticator.properties
              cp /config-source/access-control.properties /etc/trino/access-control.properties
              cp /config-source/rules.json /etc/trino/rules.json
              cp /config-source/event-listener.properties /etc/trino/event-listener.properties
              mkdir -p /etc/trino/catalog
              cp /config-source/delta.properties.template /etc/trino/catalog/delta.properties
              sed \
                -e "s|\${TRINO_ADMIN_PASSWORD_HASH}|${TRINO_ADMIN_PASSWORD_HASH}|g" \
                -e "s|\${TRINO_VISITOR_PASSWORD_HASH}|${TRINO_VISITOR_PASSWORD_HASH}|g" \
                /config-source/password.db.template > /etc/trino/password.db
              chmod 600 /etc/trino/password.db
              echo 'http-server.process-forwarded=true' >> /etc/trino/config.properties
          env:
            - name: MINIO_ROOT_USER
              $patch: delete
            - name: MINIO_ROOT_PASSWORD
              $patch: delete
      containers:
        - name: trino
          env:
            - name: AWS_REGION
              value: "us-east-1"
