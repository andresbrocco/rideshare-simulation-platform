apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

# Shared AWS production configuration (ECR images, IRSA, ExternalSecrets, ALB Ingress, monitoring).
# Applied by overlays/production-duckdb and overlays/production-glue via `components:`.

resources:
  # External Secrets (syncs from AWS Secrets Manager)
  - secretstore-aws-patch.yaml
  - ../../manifests/external-secrets-namespace.yaml
  - ../../manifests/external-secrets-api-keys.yaml
  - ../../manifests/external-secrets-app-credentials.yaml

  # IRSA ServiceAccounts (pods assume IAM roles via projected tokens)
  - serviceaccount-irsa-patches.yaml

  # Prometheus RBAC (ServiceAccount + ClusterRole for Kubernetes SD)
  - prometheus-rbac.yaml

  # Storage (EBS gp3 replaces local-path provisioner)
  - storageclass-ebs.yaml

  # ALB Ingress (per-service subdomain routing via IngressGroup)
  - ingress-api.yaml
  - ingress-grafana.yaml
  - ingress-airflow.yaml
  - ingress-trino.yaml
  - ingress-prometheus.yaml
  - ingress-control-panel.yaml

# Generate ConfigMaps from source files so ArgoCD manages them
configMapGenerator:
  - name: airflow-init-scripts
    options:
      disableNameSuffixHash: true
    files:
      - export-dbt-to-s3.py=../../../scripts/export-dbt-to-s3.py
      - register-trino-tables.py=../../../scripts/register-trino-tables.py
      - register-glue-tables.py=../../../scripts/register-glue-tables.py

  - name: airflow-dbt-project
    options:
      disableNameSuffixHash: true
    files:
      - dbt-project.tar.gz

  - name: airflow-great-expectations
    options:
      disableNameSuffixHash: true
    files:
      - ge-project.tar.gz

images:
  # Custom service images from ECR (placeholders resolved during deploy)
  # 962393283188 → AWS account ID, ae0872bc156d30a215def1886f67ed78af5c7292 → git SHA for immutable deploys
  - name: rideshare-simulation
    newName: 962393283188.dkr.ecr.us-east-1.amazonaws.com/rideshare/simulation
    newTag: ae0872bc156d30a215def1886f67ed78af5c7292
  - name: rideshare-stream-processor
    newName: 962393283188.dkr.ecr.us-east-1.amazonaws.com/rideshare/stream-processor
    newTag: ae0872bc156d30a215def1886f67ed78af5c7292
  - name: rideshare-performance-controller
    newName: 962393283188.dkr.ecr.us-east-1.amazonaws.com/rideshare/performance-controller
    newTag: ae0872bc156d30a215def1886f67ed78af5c7292
  - name: rideshare-control-panel
    newName: 962393283188.dkr.ecr.us-east-1.amazonaws.com/rideshare/control-panel
    newTag: ae0872bc156d30a215def1886f67ed78af5c7292
  - name: rideshare-bronze-ingestion
    newName: 962393283188.dkr.ecr.us-east-1.amazonaws.com/rideshare/bronze-ingestion
    newTag: ae0872bc156d30a215def1886f67ed78af5c7292
  - name: rideshare-osrm
    newName: 962393283188.dkr.ecr.us-east-1.amazonaws.com/rideshare/osrm
    newTag: ae0872bc156d30a215def1886f67ed78af5c7292
  - name: otel/opentelemetry-collector-contrib
    newName: 962393283188.dkr.ecr.us-east-1.amazonaws.com/rideshare/otel-collector
    newTag: ae0872bc156d30a215def1886f67ed78af5c7292

patches:
  # Override imagePullPolicy from Never (local dev) to IfNotPresent (SHA tags are immutable)
  - patch: '[{"op": "replace", "path": "/spec/template/spec/containers/0/imagePullPolicy", "value": "IfNotPresent"}]'
    target:
      kind: Deployment
      labelSelector: app in (simulation,stream-processor,performance-controller,control-panel,bronze-ingestion,osrm,otel-collector)
  - patch: '[{"op": "replace", "path": "/spec/template/spec/containers/0/imagePullPolicy", "value": "IfNotPresent"}]'
    target:
      kind: StatefulSet
      name: kafka
  - patch: '[{"op": "replace", "path": "/spec/template/spec/containers/0/imagePullPolicy", "value": "IfNotPresent"}]'
    target:
      kind: DaemonSet
      name: otel-collector-logs

  # ConfigMap patches for production environment
  - path: configmap-core-patch.yaml
    target:
      kind: ConfigMap
      name: core-config

  - path: configmap-data-pipeline-patch.yaml
    target:
      kind: ConfigMap
      name: data-pipeline-config

  # Bind Deployments to their IRSA ServiceAccounts
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: placeholder
      spec:
        template:
          spec:
            serviceAccountName: simulation
    target:
      kind: Deployment
      name: simulation

  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: placeholder
      spec:
        template:
          spec:
            serviceAccountName: bronze-ingestion
    target:
      kind: Deployment
      name: bronze-ingestion

  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: placeholder
      spec:
        template:
          spec:
            serviceAccountName: airflow-scheduler
    target:
      kind: Deployment
      name: airflow-scheduler

  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: placeholder
      spec:
        template:
          spec:
            serviceAccountName: airflow-webserver
    target:
      kind: Deployment
      name: airflow-webserver

  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: placeholder
      spec:
        template:
          spec:
            serviceAccountName: trino
    target:
      kind: Deployment
      name: trino

  # Point ExternalSecrets to production SecretStore
  - patch: |-
      apiVersion: external-secrets.io/v1beta1
      kind: ExternalSecret
      metadata:
        name: placeholder
      spec:
        secretStoreRef:
          name: aws-secrets-manager
    target:
      kind: ExternalSecret

  # Core service manifests

  # Kafka: EBS-backed PVC replaces emptyDir for data persistence
  - path: kafka-patch.yaml
    target:
      kind: StatefulSet
      name: kafka

  # Trino deployment: Remove MinIO initContainer and credential references
  - path: trino-patch.yaml
    target:
      kind: Deployment
      name: trino

  # Pipeline and monitoring manifests

  # Airflow: RDS connection, subpath serving, remove MinIO endpoint
  - path: airflow-webserver-patch.yaml
    target:
      kind: Deployment
      name: airflow-webserver

  - path: airflow-scheduler-patch.yaml
    target:
      kind: Deployment
      name: airflow-scheduler

  # Bronze Ingestion: Remove MinIO dependencies, use IRSA for S3
  - path: bronze-ingestion-patch.yaml
    target:
      kind: Deployment
      name: bronze-ingestion

  # Bronze Init: Override S3 bucket name for production
  - path: bronze-init-patch.yaml
    target:
      kind: CronJob
      name: bronze-init

  # Simulation: Production domain, S3 checkpoints, deployment env
  - path: simulation-patch.yaml
    target:
      kind: Deployment
      name: simulation

  # Grafana: Production domain URL, disable anonymous access
  - path: grafana-patch.yaml
    target:
      kind: Deployment
      name: grafana

  # Redis: Enable authentication with password from secrets
  - path: redis-patch.yaml
    target:
      kind: Deployment
      name: redis

  # Prometheus: Bind to ServiceAccount for Kubernetes SD RBAC
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: placeholder
      spec:
        template:
          spec:
            serviceAccountName: prometheus
    target:
      kind: Deployment
      name: prometheus

  # Prometheus: Kubernetes SD, kube-state-metrics, annotation-based pod discovery
  - path: prometheus-config-patch.yaml
    target:
      kind: ConfigMap
      name: prometheus-config

  # Prometheus: Production recording rules with Kubernetes label selectors
  - path: prometheus-rules-patch.yaml
    target:
      kind: ConfigMap
      name: prometheus-rules

  # Performance Controller: production deployment environment
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: placeholder
      spec:
        template:
          spec:
            containers:
              - name: performance-controller
                env:
                  - name: DEPLOYMENT_ENV
                    value: "production"
    target:
      kind: Deployment
      name: performance-controller

  # Loki: S3 storage config for production (no MinIO)
  - path: loki-config-patch.yaml
    target:
      kind: ConfigMap
      name: loki-config

  - path: loki-patch.yaml
    target:
      kind: Deployment
      name: loki

  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: placeholder
      spec:
        template:
          spec:
            serviceAccountName: loki
    target:
      kind: Deployment
      name: loki

  # Tempo: S3 storage config for production (no MinIO)
  - path: tempo-config-patch.yaml
    target:
      kind: ConfigMap
      name: tempo-config

  - path: tempo-patch.yaml
    target:
      kind: Deployment
      name: tempo

  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: placeholder
      spec:
        template:
          spec:
            serviceAccountName: tempo
    target:
      kind: Deployment
      name: tempo

  # OTel Collector: Production environment for OTLP Deployment and Logs DaemonSet
  - path: otel-collector-config-patch.yaml
    target:
      kind: ConfigMap
      name: otel-collector-config

  - path: otel-collector-logs-config-patch.yaml
    target:
      kind: ConfigMap
      name: otel-collector-logs-config
