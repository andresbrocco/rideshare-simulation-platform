name: Deploy Lambda

on:
  push:
    branches: [main]
    paths:
      - 'services/auth-deploy/**'
      - 'services/ai-chat/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/rideshare-github-actions
          aws-region: us-east-1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        working-directory: services/auth-deploy
        run: |
          pip install -r requirements.txt --target ./package --quiet

      - name: Create deployment package
        working-directory: services/auth-deploy
        run: |
          # Bundle installed dependencies at the zip root so Lambda can import them
          # from /var/task/. We cd into ./package so zip paths are relative to it
          # (e.g. boto3/__init__.py, not package/boto3/__init__.py).
          cd ./package && zip -r /tmp/lambda.zip . && cd ..

          # Add source files from the auth-deploy directory: .py files (excluding tests)
          # and .json files — no subdirectories, matching Terraform's archive_file behavior
          find . -maxdepth 1 -name "*.py" ! -name "test_*.py" -exec zip -j /tmp/lambda.zip {} +
          find . -maxdepth 1 -name "*.json" -exec zip -j /tmp/lambda.zip {} +

      - name: Verify package contents
        run: |
          echo "=== Package contents ==="
          unzip -l /tmp/lambda.zip

          verify_present() {
            local file="$1"
            if unzip -l /tmp/lambda.zip | grep -q "  ${file}$"; then
              echo "OK: ${file}"
            else
              echo "MISSING: ${file}"
              exit 1
            fi
          }

          verify_absent_at_root() {
            local pattern="$1"
            # Only check root-level files (no slashes in path), not files inside dependency packages
            if unzip -l /tmp/lambda.zip | awk '{print $NF}' | grep -vF '/' | grep -qE "${pattern}"; then
              echo "UNEXPECTED root-level match for pattern '${pattern}'"
              unzip -l /tmp/lambda.zip | awk '{print $NF}' | grep -vF '/' | grep -E "${pattern}"
              exit 1
            else
              echo "OK (absent at root): ${pattern}"
            fi
          }

          # verify_handler_present
          verify_present handler.py

          # verify_grafana_provisioner_present
          verify_present provision_grafana_viewer.py

          # verify_airflow_provisioner_present
          verify_present provision_airflow_viewer.py

          # verify_minio_provisioner_present
          verify_present provision_minio_visitor.py

          # verify_simulation_api_provisioner_present
          verify_present provision_simulation_api_viewer.py

          # verify_minio_policy_present
          verify_present minio-visitor-readonly.json

          # verify_no_test_files at zip root (dependency packages like PyCryptodome have their own test files)
          verify_absent_at_root "test_.*\.py"

          # verify_no_nested_paths — source files must be at zip root, not under auth-deploy/
          if unzip -l /tmp/lambda.zip | awk '{print $NF}' | grep -qE '^auth-deploy/'; then
            echo "UNEXPECTED: source files are nested under auth-deploy/"
            unzip -l /tmp/lambda.zip | awk '{print $NF}' | grep -E '^auth-deploy/'
            exit 1
          else
            echo "OK (no auth-deploy/ nesting)"
          fi

          echo "=== All verification checks passed ==="

      # Note: update-function-code causes Terraform to detect drift on next plan.
      # This is acceptable — Terraform uses the same source directory, so the next
      # terraform apply is a no-op if no further code changes occurred.
      - name: Deploy function code
        run: |
          aws lambda update-function-code \
            --function-name rideshare-auth-deploy \
            --zip-file fileb:///tmp/lambda.zip

      - name: Wait for stabilization
        run: |
          aws lambda wait function-updated \
            --function-name rideshare-auth-deploy

      - name: Verify deployment
        run: |
          aws lambda get-function \
            --function-name rideshare-auth-deploy \
            --query '{State: Configuration.State, LastModified: Configuration.LastModified, CodeSha256: Configuration.CodeSha256}' \
            --output table

      # ── ai-chat Lambda ──────────────────────────────────────────────

      - name: Install ai-chat dependencies
        working-directory: services/ai-chat
        run: |
          pip install \
            -r requirements-anthropic.txt \
            -r requirements-openai.txt \
            -r requirements-google.txt \
            --target ./package --quiet

      - name: Create ai-chat deployment package
        working-directory: services/ai-chat
        run: |
          # Bundle installed dependencies at the zip root
          cd ./package && zip -r /tmp/lambda-ai-chat.zip . && cd ..

          # Add root-level .py files (excluding tests and conftest)
          find . -maxdepth 1 -name "*.py" ! -name "test_*.py" ! -name "conftest.py" \
            -exec zip -j /tmp/lambda-ai-chat.zip {} +

          # Add providers/ subdirectory preserving structure
          find ./providers -name "*.py" -exec zip /tmp/lambda-ai-chat.zip {} +

          # Add docs/ subdirectory preserving structure
          find ./docs -name "*.md" -exec zip /tmp/lambda-ai-chat.zip {} +

      - name: Verify ai-chat package contents
        run: |
          echo "=== ai-chat package contents ==="
          unzip -l /tmp/lambda-ai-chat.zip

          verify_present() {
            local file="$1"
            if unzip -l /tmp/lambda-ai-chat.zip | grep -q "  ${file}$"; then
              echo "OK: ${file}"
            else
              echo "MISSING: ${file}"
              exit 1
            fi
          }

          verify_present handler.py
          verify_present session.py
          verify_present llm_adapter.py
          verify_present _secrets.py
          verify_present providers/anthropic.py
          verify_present providers/openai.py
          verify_present providers/google.py
          verify_present providers/deepseek.py
          verify_present providers/mock.py
          verify_present providers/__init__.py
          verify_present docs/AI-CHAT-CONTEXT.md

          # No test files at root
          if unzip -l /tmp/lambda-ai-chat.zip | awk '{print $NF}' | grep -vF '/' | grep -qE "test_.*\.py"; then
            echo "UNEXPECTED root-level test files"
            exit 1
          else
            echo "OK (no test files at root)"
          fi

          # No tests/ directory
          if unzip -l /tmp/lambda-ai-chat.zip | awk '{print $NF}' | grep -qE '^tests/'; then
            echo "UNEXPECTED: tests/ directory included"
            exit 1
          else
            echo "OK (no tests/ directory)"
          fi

          echo "=== All ai-chat verification checks passed ==="

      - name: Deploy ai-chat function code
        run: |
          aws lambda update-function-code \
            --function-name rideshare-ai-chat \
            --zip-file fileb:///tmp/lambda-ai-chat.zip

      - name: Wait for ai-chat stabilization
        run: |
          aws lambda wait function-updated \
            --function-name rideshare-ai-chat

      - name: Verify ai-chat deployment
        run: |
          aws lambda get-function \
            --function-name rideshare-ai-chat \
            --query '{State: Configuration.State, LastModified: Configuration.LastModified, CodeSha256: Configuration.CodeSha256}' \
            --output table
