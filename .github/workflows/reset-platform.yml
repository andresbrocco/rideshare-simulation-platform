name: Reset Platform

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: 'Type RESET to confirm data wipe (keeps infrastructure intact)'
        required: true
        type: string
      dbt_runner:
        description: 'DBT runner backend (must match deploy)'
        required: true
        type: choice
        options:
          - duckdb
          - glue
        default: duckdb

permissions:
  id-token: write
  contents: read

jobs:
  soft-reset:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      DBT_RUNNER: ${{ github.event.inputs.dbt_runner }}

    steps:
      # ── Phase 1: Guards & Setup ──────────────────────────────────────

      - name: Verify confirmation
        run: |
          if [ "${{ github.event.inputs.confirmation }}" != "RESET" ]; then
            echo "::error::Confirmation must be exactly 'RESET'. Got: '${{ github.event.inputs.confirmation }}'"
            exit 1
          fi

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/rideshare-github-actions
          aws-region: us-east-1

      # ── Phase 2: Cluster Detection ─────────────────────────────────

      - name: Detect EKS cluster state
        id: check-cluster
        run: |
          echo "=== Checking EKS cluster API ==="
          if aws eks describe-cluster --name rideshare-eks --region us-east-1 \
            --query 'cluster.status' --output text 2>/dev/null | grep -q ACTIVE; then
            echo "cluster_api_available=true" >> "$GITHUB_OUTPUT"
            echo "Cluster API is available (ACTIVE)"

            aws eks update-kubeconfig --name rideshare-eks --region us-east-1

            echo "=== Checking for Ready nodes ==="
            READY_NODES=$(kubectl get nodes --no-headers 2>/dev/null \
              | grep -c ' Ready' || echo "0")
            if [ "$READY_NODES" -gt 0 ]; then
              echo "nodes_available=true" >> "$GITHUB_OUTPUT"
              echo "Found ${READY_NODES} Ready node(s)"
              kubectl get nodes
            else
              echo "nodes_available=false" >> "$GITHUB_OUTPUT"
              echo "::warning::Cluster API reachable but no Ready nodes (scaled to 0?)"
            fi
          else
            echo "cluster_api_available=false" >> "$GITHUB_OUTPUT"
            echo "nodes_available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::EKS cluster not reachable or not ACTIVE — running in cluster-down mode"
          fi

      # ── Phase 3: Suspend ArgoCD ──────────────────────────────────────

      - name: Suspend ArgoCD auto-sync
        if: steps.check-cluster.outputs.cluster_api_available == 'true'
        run: |
          kubectl patch application rideshare-platform -n argocd \
            --type merge -p '{"spec":{"syncPolicy":{"automated":null}}}'
          echo "ArgoCD auto-sync suspended"

      # ── Phase 4: Stop Services ───────────────────────────────────────

      - name: Scale down all application services
        if: steps.check-cluster.outputs.nodes_available == 'true'
        run: |
          echo "=== Scaling down producers ==="
          kubectl scale deployment simulation stream-processor bronze-ingestion \
            -n rideshare-prod --replicas=0

          echo "=== Scaling down pipeline ==="
          if [ "$DBT_RUNNER" != "glue" ]; then
            kubectl scale deployment hive-metastore -n rideshare-prod --replicas=0
          fi
          kubectl scale deployment airflow-webserver airflow-scheduler trino \
            -n rideshare-prod --replicas=0

          echo "=== Scaling down Redis ==="
          kubectl scale deployment redis -n rideshare-prod --replicas=0

          echo "=== Scaling down monitoring ==="
          kubectl scale deployment prometheus loki tempo grafana otel-collector \
            -n rideshare-prod --replicas=0

      - name: Wait for pods to terminate
        if: steps.check-cluster.outputs.nodes_available == 'true'
        run: |
          for LABEL in simulation stream-processor bronze-ingestion \
                       hive-metastore airflow-webserver airflow-scheduler trino \
                       redis prometheus loki tempo grafana otel-collector; do
            if kubectl get pods -l "app=${LABEL}" -n rideshare-prod --no-headers 2>/dev/null | grep -q .; then
              echo "Waiting for ${LABEL} pods to terminate..."
              kubectl wait --for=delete pod -l "app=${LABEL}" \
                -n rideshare-prod --timeout=120s 2>/dev/null \
                || echo "::warning::${LABEL} pods did not terminate within 120s"
            else
              echo "${LABEL}: no pods found (already down)"
            fi
          done
          echo "All application pods terminated or confirmed absent"

      # ── Phase 5: Wipe Kafka ──────────────────────────────────────────

      - name: Wipe Kafka (nodes available)
        if: steps.check-cluster.outputs.nodes_available == 'true'
        run: |
          echo "=== Scaling Kafka to 0 ==="
          kubectl scale statefulset kafka -n rideshare-prod --replicas=0
          if kubectl get pod kafka-0 -n rideshare-prod --no-headers 2>/dev/null | grep -q .; then
            echo "Waiting for kafka-0 to terminate..."
            kubectl wait --for=delete pod/kafka-0 -n rideshare-prod --timeout=120s 2>/dev/null \
              || echo "::warning::kafka-0 did not terminate within 120s"
          else
            echo "kafka-0 already absent"
          fi

          echo "=== Deleting Kafka PVC ==="
          kubectl delete pvc kafka-data-kafka-0 -n rideshare-prod --ignore-not-found
          echo "Kafka PVC deleted (EBS volume released)"

          echo "=== Scaling Kafka back to 1 ==="
          kubectl scale statefulset kafka -n rideshare-prod --replicas=1
          echo "Waiting for Kafka pod (EBS provisioning ~30-60s)..."
          kubectl wait --for=condition=ready pod/kafka-0 -n rideshare-prod --timeout=300s

          echo "=== Creating Kafka topics ==="
          kubectl delete job kafka-init -n rideshare-prod --ignore-not-found
          cat <<'EOF' | kubectl apply -n rideshare-prod -f -
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: kafka-init
            labels:
              app: kafka-init
          spec:
            template:
              metadata:
                labels:
                  app: kafka-init
              spec:
                restartPolicy: OnFailure
                initContainers:
                - name: wait-for-kafka
                  image: confluentinc/cp-kafka:7.5.0
                  command:
                  - sh
                  - -c
                  - |
                    echo "Waiting for Kafka to be ready..."
                    until kafka-broker-api-versions --bootstrap-server kafka-0.kafka:29092 2>/dev/null; do
                      echo "Kafka not ready, waiting..."
                      sleep 5
                    done
                    echo "Kafka is ready!"
                containers:
                - name: kafka-init
                  image: confluentinc/cp-kafka:7.5.0
                  command:
                  - sh
                  - -c
                  - |
                    echo 'Creating Kafka topics...'
                    kafka-topics --bootstrap-server kafka-0.kafka:29092 --create --if-not-exists --topic _schemas --partitions 1 --replication-factor 1 --config cleanup.policy=compact
                    kafka-topics --bootstrap-server kafka-0.kafka:29092 --create --if-not-exists --topic trips --partitions 4 --replication-factor 1
                    kafka-topics --bootstrap-server kafka-0.kafka:29092 --create --if-not-exists --topic gps_pings --partitions 8 --replication-factor 1
                    kafka-topics --bootstrap-server kafka-0.kafka:29092 --create --if-not-exists --topic driver_status --partitions 2 --replication-factor 1
                    kafka-topics --bootstrap-server kafka-0.kafka:29092 --create --if-not-exists --topic surge_updates --partitions 2 --replication-factor 1
                    kafka-topics --bootstrap-server kafka-0.kafka:29092 --create --if-not-exists --topic ratings --partitions 2 --replication-factor 1
                    kafka-topics --bootstrap-server kafka-0.kafka:29092 --create --if-not-exists --topic payments --partitions 2 --replication-factor 1
                    kafka-topics --bootstrap-server kafka-0.kafka:29092 --create --if-not-exists --topic driver_profiles --partitions 1 --replication-factor 1
                    kafka-topics --bootstrap-server kafka-0.kafka:29092 --create --if-not-exists --topic rider_profiles --partitions 1 --replication-factor 1
                    echo 'Kafka topics created successfully'
                    kafka-topics --bootstrap-server kafka-0.kafka:29092 --list
          EOF
          kubectl wait --for=condition=complete job/kafka-init -n rideshare-prod --timeout=120s

      - name: Wipe Kafka PVC (API only, no nodes)
        if: steps.check-cluster.outputs.cluster_api_available == 'true' && steps.check-cluster.outputs.nodes_available != 'true'
        run: |
          echo "Cluster API available but no nodes — deleting Kafka PVC via kubectl"
          echo "EBS CSI driver will delete the underlying volume when a node comes back"
          kubectl delete pvc kafka-data-kafka-0 -n rideshare-prod --ignore-not-found
          echo "Kafka PVC deleted"
          echo "::notice::kafka-init Job will recreate topics when Kafka next starts"

      - name: Wipe Kafka EBS volumes (cluster down)
        if: steps.check-cluster.outputs.cluster_api_available != 'true'
        run: |
          echo "Cluster not reachable — deleting orphaned Kafka EBS volumes via AWS API"
          VOLUME_IDS=$(aws ec2 describe-volumes \
            --filters \
              "Name=tag:kubernetes.io/cluster/rideshare-eks,Values=owned" \
              "Name=status,Values=available" \
              "Name=tag:kubernetes.io/created-for/pvc/name,Values=kafka-data-kafka-0" \
            --query 'Volumes[].VolumeId' --output text)

          if [ -z "$VOLUME_IDS" ] || [ "$VOLUME_IDS" = "None" ]; then
            echo "No orphaned Kafka EBS volumes found"
          else
            for VOL_ID in $VOLUME_IDS; do
              echo "Deleting volume ${VOL_ID}..."
              aws ec2 delete-volume --volume-id "$VOL_ID"
              echo "Deleted ${VOL_ID}"
            done
          fi
          echo "::warning::When the cluster returns, delete stale PVC if it exists: kubectl delete pvc kafka-data-kafka-0 -n rideshare-prod --ignore-not-found"

      # ── Phase 6: Wipe S3 ────────────────────────────────────────────

      - name: Empty S3 lakehouse buckets
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          for BUCKET in bronze silver gold checkpoints; do
            echo "Emptying rideshare-${ACCOUNT_ID}-${BUCKET}..."
            aws s3 rm "s3://rideshare-${ACCOUNT_ID}-${BUCKET}" --recursive
          done
          echo "S3 lakehouse buckets emptied"

      # ── Phase 7: Wipe Glue Catalog ─────────────────────────────────

      - name: Wipe Glue Catalog tables
        if: github.event.inputs.dbt_runner == 'glue'
        run: |
          for DB in rideshare_bronze rideshare_silver rideshare_gold; do
            echo "Deleting tables from ${DB}..."
            TABLES=$(aws glue get-tables --database-name "$DB" \
              --query 'TableList[].Name' --output text)
            if [ -n "$TABLES" ]; then
              for TABLE in $TABLES; do
                aws glue delete-table --database-name "$DB" --name "$TABLE"
                echo "  Deleted ${DB}.${TABLE}"
              done
            else
              echo "  No tables found in ${DB}"
            fi
          done
          echo "Glue Catalog tables deleted (databases preserved)"

      # ── Phase 8: Wipe RDS via Lambda ───────────────────────────────

      - name: Reset RDS databases via Lambda
        run: |
          MASTER_PASSWORD=$(aws secretsmanager get-secret-value \
            --secret-id rideshare/rds --query SecretString --output text | jq -r '.MASTER_PASSWORD')
          RDS_FULL_ENDPOINT=$(aws secretsmanager get-secret-value \
            --secret-id rideshare/rds --query SecretString --output text | jq -r '.ENDPOINT')
          RDS_HOST="${RDS_FULL_ENDPOINT%%:*}"
          AIRFLOW_PASSWORD=$(aws secretsmanager get-secret-value \
            --secret-id rideshare/data-pipeline --query SecretString --output text | jq -r '.POSTGRES_AIRFLOW_PASSWORD')

          DATABASES="[{\"name\":\"airflow\",\"role\":\"airflow\",\"password\":\"${AIRFLOW_PASSWORD}\"}]"
          if [ "$DBT_RUNNER" != "glue" ]; then
            METASTORE_PASSWORD=$(aws secretsmanager get-secret-value \
              --secret-id rideshare/data-pipeline --query SecretString --output text | jq -r '.POSTGRES_METASTORE_PASSWORD')
            DATABASES="[{\"name\":\"airflow\",\"role\":\"airflow\",\"password\":\"${AIRFLOW_PASSWORD}\"},{\"name\":\"metastore\",\"role\":\"metastore\",\"password\":\"${METASTORE_PASSWORD}\"}]"
          fi

          PAYLOAD=$(jq -n \
            --arg host "$RDS_HOST" \
            --arg password "$MASTER_PASSWORD" \
            --argjson databases "$DATABASES" \
            '{host: $host, port: 5432, master_password: $password, databases: $databases}')

          aws lambda invoke \
            --function-name rideshare-rds-reset \
            --payload "$PAYLOAD" \
            --cli-binary-format raw-in-base64-out \
            /tmp/rds-reset-response.json

          cat /tmp/rds-reset-response.json
          BODY=$(jq -r '.body' /tmp/rds-reset-response.json)
          ERRORS=$(echo "$BODY" | jq '[.results[] | select(.status == "error")] | length')
          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::RDS reset failed"
            echo "$BODY" | jq '.results[] | select(.status == "error")'
            exit 1
          fi
          echo "RDS databases reset successfully"

      # ── Phase 9: Redis & Monitoring ────────────────────────────────

      - name: Redis & monitoring data wiped (emptyDir)
        if: steps.check-cluster.outputs.nodes_available == 'true'
        run: |
          echo "Redis uses emptyDir volume — data was destroyed when pod terminated in Phase 4"
          echo "Monitoring services use emptyDir volumes — data destroyed on scale-down:"
          echo "  - Prometheus (/prometheus) — TSDB wiped"
          echo "  - Loki (/loki) — local cache wiped (S3 backend retained)"
          echo "  - Tempo (/var/tempo) — WAL wiped (S3 backend retained)"
          echo "  - Grafana — dashboards restored from ConfigMaps on startup"
          echo "  - OTel Collector — stateless, no persistent data"
          echo "Fresh pods will start in the next phase"

      # ── Phase 10: Restart & Scale Up ────────────────────────────────

      - name: Scale up monitoring
        if: steps.check-cluster.outputs.nodes_available == 'true'
        run: |
          for SVC in prometheus loki tempo grafana; do
            echo "Scaling up ${SVC}..."
            kubectl scale deployment "${SVC}" -n rideshare-prod --replicas=1
            echo "Waiting for ${SVC} (up to 3 min)..."
            if ! kubectl wait --for=condition=available "deployment/${SVC}" \
              -n rideshare-prod --timeout=180s; then
              echo "::warning::${SVC} not ready within timeout — dumping diagnostics"
              kubectl get pods -l "app=${SVC}" -n rideshare-prod -o wide
              kubectl describe pod -l "app=${SVC}" -n rideshare-prod | tail -40
              kubectl logs -l "app=${SVC}" -n rideshare-prod --all-containers --tail=30 || true
              echo "Continuing — will be reconciled"
            fi
          done

          echo "Scaling up otel-collector..."
          kubectl scale deployment otel-collector -n rideshare-prod --replicas=1
          echo "Waiting for otel-collector (up to 3 min)..."
          if ! kubectl wait --for=condition=available deployment/otel-collector \
            -n rideshare-prod --timeout=180s; then
            echo "::warning::otel-collector not ready within timeout — dumping diagnostics"
            kubectl get pods -l app=otel-collector -n rideshare-prod -o wide
            kubectl describe pod -l app=otel-collector -n rideshare-prod | tail -40
            kubectl logs -l app=otel-collector -n rideshare-prod --all-containers --tail=30 || true
            echo "Continuing — will be reconciled"
          fi

      - name: Restart schema-registry
        if: steps.check-cluster.outputs.nodes_available == 'true'
        run: |
          kubectl scale deployment schema-registry -n rideshare-prod --replicas=0
          kubectl wait --for=delete pod -l app=schema-registry \
            -n rideshare-prod --timeout=120s 2>/dev/null || true
          kubectl scale deployment schema-registry -n rideshare-prod --replicas=1

          echo "Waiting for schema-registry (up to 5 min)..."
          if ! kubectl wait --for=condition=available deployment/schema-registry \
            -n rideshare-prod --timeout=300s; then
            echo "::warning::schema-registry not ready within timeout — dumping diagnostics"
            kubectl get pods -l app=schema-registry -n rideshare-prod -o wide
            kubectl describe pod -l app=schema-registry -n rideshare-prod | tail -40
            kubectl logs -l app=schema-registry -n rideshare-prod --all-containers --tail=30 || true
            echo "Continuing — ArgoCD self-heal will reconcile"
          fi

      - name: Scale up Redis
        if: steps.check-cluster.outputs.nodes_available == 'true'
        run: |
          kubectl scale deployment redis -n rideshare-prod --replicas=1
          echo "Waiting for Redis (up to 2 min)..."
          if ! kubectl wait --for=condition=available deployment/redis \
            -n rideshare-prod --timeout=120s; then
            echo "::warning::redis not ready within timeout — dumping diagnostics"
            kubectl get pods -l app=redis -n rideshare-prod -o wide
            kubectl describe pod -l app=redis -n rideshare-prod | tail -40
            kubectl logs -l app=redis -n rideshare-prod --all-containers --tail=30 || true
            echo "Continuing — ArgoCD self-heal will reconcile"
          fi

      - name: Scale up hive-metastore
        if: steps.check-cluster.outputs.nodes_available == 'true' && github.event.inputs.dbt_runner != 'glue'
        run: |
          kubectl scale deployment hive-metastore -n rideshare-prod --replicas=1
          echo "Waiting for Hive Metastore (runs schematool -initSchema, up to 5 min)..."
          if ! kubectl wait --for=condition=available deployment/hive-metastore \
            -n rideshare-prod --timeout=300s; then
            echo "::warning::hive-metastore not ready within timeout — dumping diagnostics"
            kubectl get pods -l app=hive-metastore -n rideshare-prod -o wide
            kubectl describe pod -l app=hive-metastore -n rideshare-prod | tail -40
            kubectl logs -l app=hive-metastore -n rideshare-prod --all-containers --tail=30 || true
            echo "Continuing — ArgoCD self-heal will reconcile"
          fi

      - name: Scale up trino
        if: steps.check-cluster.outputs.nodes_available == 'true'
        run: |
          kubectl scale deployment trino -n rideshare-prod --replicas=1
          echo "Waiting for Trino (up to 5 min)..."
          if ! kubectl wait --for=condition=available deployment/trino \
            -n rideshare-prod --timeout=300s; then
            echo "::warning::trino not ready within timeout — dumping diagnostics"
            kubectl get pods -l app=trino -n rideshare-prod -o wide
            kubectl describe pod -l app=trino -n rideshare-prod | tail -40
            kubectl logs -l app=trino -n rideshare-prod --all-containers --tail=30 || true
            echo "Continuing — ArgoCD self-heal will reconcile"
          fi

      - name: Scale up airflow
        if: steps.check-cluster.outputs.nodes_available == 'true'
        run: |
          kubectl scale deployment airflow-webserver -n rideshare-prod --replicas=1
          echo "Waiting for Airflow webserver (runs airflow db migrate, up to 10 min)..."
          if ! kubectl wait --for=condition=available deployment/airflow-webserver \
            -n rideshare-prod --timeout=600s; then
            echo "::warning::airflow-webserver not ready within timeout — dumping diagnostics"
            kubectl get pods -l app=airflow-webserver -n rideshare-prod -o wide
            kubectl describe pod -l app=airflow-webserver -n rideshare-prod | tail -40
            kubectl logs -l app=airflow-webserver -n rideshare-prod --all-containers --tail=30 || true
            echo "Continuing — ArgoCD self-heal will reconcile"
          fi

          kubectl scale deployment airflow-scheduler -n rideshare-prod --replicas=1
          echo "Waiting for Airflow scheduler (up to 5 min)..."
          if ! kubectl wait --for=condition=available deployment/airflow-scheduler \
            -n rideshare-prod --timeout=300s; then
            echo "::warning::airflow-scheduler not ready within timeout — dumping diagnostics"
            kubectl get pods -l app=airflow-scheduler -n rideshare-prod -o wide
            kubectl describe pod -l app=airflow-scheduler -n rideshare-prod | tail -40
            kubectl logs -l app=airflow-scheduler -n rideshare-prod --all-containers --tail=30 || true
            echo "Continuing — ArgoCD self-heal will reconcile"
          fi

      - name: Scale up data producers
        if: steps.check-cluster.outputs.nodes_available == 'true'
        run: |
          kubectl scale deployment simulation stream-processor bronze-ingestion \
            -n rideshare-prod --replicas=1

      # ── Phase 11: Health Checks ────────────────────────────────────

      - name: Wait for deployments available
        if: steps.check-cluster.outputs.nodes_available == 'true'
        run: |
          FAILED=0

          echo "=== Checking monitoring ==="
          for SVC in prometheus loki tempo grafana otel-collector; do
            echo "Checking ${SVC}..."
            if ! kubectl wait --for=condition=available "deployment/${SVC}" \
              -n rideshare-prod --timeout=60s; then
              echo "::warning::${SVC} not ready within timeout"
              kubectl get pods -l "app=${SVC}" -n rideshare-prod -o wide
              FAILED=$((FAILED + 1))
            fi
          done

          echo "=== Checking Redis ==="
          if ! kubectl wait --for=condition=available deployment/redis \
            -n rideshare-prod --timeout=60s; then
            echo "::warning::redis not ready within timeout"
            kubectl get pods -l app=redis -n rideshare-prod -o wide
            FAILED=$((FAILED + 1))
          fi

          echo "=== Checking producers ==="
          echo "Waiting for simulation..."
          if ! kubectl wait --for=condition=available deployment/simulation \
            -n rideshare-prod --timeout=600s; then
            echo "::warning::simulation not ready within timeout"
            kubectl get pods -l app=simulation -n rideshare-prod -o wide
            FAILED=$((FAILED + 1))
          fi

          echo "Waiting for stream-processor..."
          if ! kubectl wait --for=condition=available deployment/stream-processor \
            -n rideshare-prod --timeout=300s; then
            echo "::warning::stream-processor not ready within timeout"
            kubectl get pods -l app=stream-processor -n rideshare-prod -o wide
            FAILED=$((FAILED + 1))
          fi

          echo "Waiting for bronze-ingestion..."
          if ! kubectl wait --for=condition=available deployment/bronze-ingestion \
            -n rideshare-prod --timeout=300s; then
            echo "::warning::bronze-ingestion not ready within timeout"
            kubectl get pods -l app=bronze-ingestion -n rideshare-prod -o wide
            FAILED=$((FAILED + 1))
          fi

          if [ "$FAILED" -gt 0 ]; then
            echo "::warning::$FAILED deployment(s) not yet available — ArgoCD self-heal will reconcile"
          else
            echo "All deployments available"
          fi

      # ── Phase 12: Restore ArgoCD ───────────────────────────────────

      - name: Restore ArgoCD auto-sync
        if: always() && steps.check-cluster.outputs.cluster_api_available == 'true'
        run: |
          kubectl patch application rideshare-platform -n argocd \
            --type merge -p '{"spec":{"syncPolicy":{"automated":{"prune":true,"selfHeal":true,"allowEmpty":false}}}}'
          echo "ArgoCD auto-sync restored"

      - name: Trigger ArgoCD hard refresh
        if: always() && steps.check-cluster.outputs.cluster_api_available == 'true'
        run: |
          kubectl annotate application rideshare-platform -n argocd \
            argocd.argoproj.io/refresh=hard --overwrite
          echo "ArgoCD hard refresh triggered"

      # ── Summary ──────────────────────────────────────────────────────

      - name: Reset Summary
        if: always()
        run: |
          CLUSTER_API="${{ steps.check-cluster.outputs.cluster_api_available }}"
          NODES="${{ steps.check-cluster.outputs.nodes_available }}"

          echo "================================"
          echo "Soft Reset Complete"
          echo "================================"
          echo ""
          echo "CLUSTER STATE:"
          if [ "$NODES" = "true" ]; then
            echo "  Cluster API: available | Nodes: available"
            echo "  Mode: Full reset (all phases executed)"
          elif [ "$CLUSTER_API" = "true" ]; then
            echo "  Cluster API: available | Nodes: NOT available"
            echo "  Mode: Partial (kubectl service steps skipped, PVC deleted)"
          else
            echo "  Cluster API: NOT available | Nodes: NOT available"
            echo "  Mode: AWS-only (S3, RDS Lambda, Kafka EBS cleanup)"
          fi
          echo ""
          echo "WIPED:"
          if [ "$NODES" = "true" ]; then
            echo "  - Kafka topics + data (PVC deleted and recreated)"
          elif [ "$CLUSTER_API" = "true" ]; then
            echo "  - Kafka PVC deleted (topics will be recreated by kafka-init on next startup)"
          else
            echo "  - Kafka orphaned EBS volumes deleted (if any found)"
          fi
          echo "  - S3 lakehouse (bronze, silver, gold, checkpoints)"
          echo "  - RDS databases reset via Lambda"
          if [ "$DBT_RUNNER" = "glue" ]; then
            echo "  - Glue Catalog tables (rideshare_bronze, rideshare_silver, rideshare_gold)"
          fi
          if [ "$NODES" = "true" ]; then
            echo "  - Redis (emptyDir volume destroyed on scale-down)"
