name: Deploy

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'What to deploy'
        required: true
        type: choice
        options:
          - deploy-all
          - deploy-platform
          - deploy-frontend
      dbt_runner:
        description: 'DBT runner (controls Kustomize overlay + Airflow target)'
        required: true
        type: choice
        default: duckdb
        options:
          - duckdb
          - glue

permissions:
  id-token: write
  contents: write

jobs:
  deploy-platform:
    if: contains(fromJSON('["deploy-all", "deploy-platform"]'), github.event.inputs.action)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.3

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/rideshare-github-actions
          aws-region: us-east-1

      - name: Sync GitHub PAT to Secrets Manager
        env:
          GH_DEPLOY_PAT: ${{ secrets.GH_DEPLOY_PAT }}
        run: |
          if [ -n "$GH_DEPLOY_PAT" ]; then
            aws secretsmanager put-secret-value \
              --secret-id rideshare/github-pat \
              --secret-string "{\"GITHUB_PAT\":\"${GH_DEPLOY_PAT}\"}"
            echo "GitHub PAT synced to Secrets Manager"
          else
            echo "::warning::GH_DEPLOY_PAT repo secret not set — Lambda deploy trigger will not work"
          fi

      - name: Install Lambda Python dependencies
        run: |
          pip install -r infrastructure/lambda/auth-deploy/requirements.txt \
            -t infrastructure/lambda/auth-deploy/ \
            --platform manylinux2014_x86_64 \
            --only-binary=:all: \
            --python-version 3.13 \
            --quiet

      - name: Verify Foundation State
        working-directory: infrastructure/terraform/foundation
        env:
          TF_VAR_owner_reply_to_email: ${{ secrets.OWNER_REPLY_TO_EMAIL }}
        run: |
          terraform init -input=false -backend-config="bucket=rideshare-tf-state-${{ secrets.AWS_ACCOUNT_ID }}"
          EXIT=0
          terraform plan -input=false -detailed-exitcode 2>&1 || EXIT=$?
          if [ "$EXIT" -eq 2 ]; then
            echo "::error::Foundation has unapplied changes. Run 'terraform apply' on infrastructure/terraform/foundation/ before deploying."
            exit 1
          fi

      - name: Terraform Init (Platform)
        working-directory: infrastructure/terraform/platform
        run: |
          terraform init -input=false \
            -backend-config="bucket=rideshare-tf-state-${{ secrets.AWS_ACCOUNT_ID }}"

      - name: Reconcile Terraform State
        working-directory: infrastructure/terraform/platform
        run: |
          echo "Importing orphaned resources into Terraform state (safe to fail)..."

          # Core resources (may already exist from a previous partial apply)
          terraform import 'module.eks.aws_eks_cluster.main' 'rideshare-eks' 2>&1 || true
          terraform import 'module.alb.aws_iam_role.alb_controller' 'aws-load-balancer-controller' 2>&1 || true
          terraform import 'module.rds.aws_db_subnet_group.main' 'rideshare-rds-subnet-group' 2>&1 || true
          terraform import 'module.rds.aws_db_instance.main' 'rideshare-postgres' 2>&1 || true

          # EKS node group (may already exist from a previous partial apply)
          terraform import 'module.eks.aws_eks_node_group.main' 'rideshare-eks:rideshare-node-group' 2>&1 || true

          # EKS addons (may already exist from a previous partial apply)
          terraform import 'module.eks.aws_eks_addon.vpc_cni' 'rideshare-eks:vpc-cni' 2>&1 || true
          terraform import 'module.eks.aws_eks_addon.kube_proxy' 'rideshare-eks:kube-proxy' 2>&1 || true
          terraform import 'module.eks.aws_eks_addon.coredns' 'rideshare-eks:coredns' 2>&1 || true
          terraform import 'module.eks.aws_eks_addon.ebs_csi' 'rideshare-eks:aws-ebs-csi-driver' 2>&1 || true
          terraform import 'module.eks.aws_eks_addon.pod_identity_agent' 'rideshare-eks:eks-pod-identity-agent' 2>&1 || true

          # GitHub Actions access entry is handled by bootstrap_cluster_creator_admin_permissions.
          # Remove from state if left over from a previous run that managed it explicitly.
          terraform state rm 'aws_eks_access_entry.github_actions' 2>&1 || true
          terraform state rm 'aws_eks_access_policy_association.github_actions' 2>&1 || true

          # Helm releases (may already exist from a previous partial apply)
          terraform import 'module.alb.helm_release.aws_load_balancer_controller' 'kube-system/aws-load-balancer-controller' 2>&1 || true
          terraform import 'module.alb.helm_release.external_secrets' 'external-secrets/external-secrets' 2>&1 || true
          terraform import 'module.alb.helm_release.kube_state_metrics' 'monitoring/kube-state-metrics' 2>&1 || true

          echo "State reconciliation complete."

      - name: Terraform Plan (Platform)
        working-directory: infrastructure/terraform/platform
        run: terraform plan -input=false -out=tfplan

      - name: Terraform Apply (Platform)
        working-directory: infrastructure/terraform/platform
        run: terraform apply -auto-approve tfplan

      - name: Get Terraform Outputs
        id: tf-outputs
        working-directory: infrastructure/terraform/platform
        run: |
          CLUSTER_NAME=$(terraform output -raw cluster_name)
          CLUSTER_ENDPOINT=$(terraform output -raw cluster_endpoint)
          RDS_ENDPOINT=$(terraform output -raw rds_endpoint)
          {
            echo "cluster_name=$CLUSTER_NAME"
            echo "cluster_endpoint=$CLUSTER_ENDPOINT"
            echo "rds_endpoint=$RDS_ENDPOINT"
          } >> "$GITHUB_OUTPUT"

      - name: Ensure all service images exist at deploy SHA
        run: |
          IMAGE_TAG="${{ github.sha }}"

          SERVICES=(simulation stream-processor control-panel bronze-ingestion hive-metastore performance-controller osrm otel-collector)

          for SERVICE in "${SERVICES[@]}"; do
            REPO="rideshare/${SERVICE}"
            echo -n "Checking ${REPO}:${IMAGE_TAG}... "

            if aws ecr describe-images --repository-name "$REPO" \
                --image-ids imageTag="$IMAGE_TAG" &>/dev/null; then
              echo "exists"
            else
              echo "missing — retagging from latest"
              MANIFEST=$(aws ecr batch-get-image --repository-name "$REPO" \
                --image-ids imageTag=latest \
                --query 'images[0].imageManifest' --output text)

              if [ "$MANIFEST" = "None" ] || [ -z "$MANIFEST" ]; then
                echo "::error::No 'latest' image found for ${REPO}. Build it first."
                exit 1
              fi

              aws ecr put-image --repository-name "$REPO" \
                --image-tag "$IMAGE_TAG" --image-manifest "$MANIFEST" || true
              echo "  retagged ${REPO}:latest → ${REPO}:${IMAGE_TAG}"
            fi
          done

      - name: Resolve Production Values
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          RDS_ENDPOINT="${{ steps.tf-outputs.outputs.rds_endpoint }}"
          ACM_CERT_ARN=$(aws acm list-certificates --region us-east-1 \
            --query "CertificateSummaryList[?DomainName=='ridesharing.portfolio.andresbrocco.com'].CertificateArn" \
            --output text)
          ALB_SG_ID=$(aws ec2 describe-security-groups --region us-east-1 \
            --filters "Name=group-name,Values=rideshare-alb-sg" \
            --query 'SecurityGroups[0].GroupId' --output text)

          echo "Account ID: $ACCOUNT_ID"
          echo "RDS Endpoint: $RDS_ENDPOINT"
          echo "ACM Cert ARN: $ACM_CERT_ARN"
          echo "ALB SG ID: $ALB_SG_ID"

          if [ -z "$ACCOUNT_ID" ] || [ -z "$RDS_ENDPOINT" ] || [ -z "$ACM_CERT_ARN" ] || [ -z "$ALB_SG_ID" ]; then
            echo "Error: One or more production values could not be resolved"
            exit 1
          fi

          IMAGE_TAG="${{ github.sha }}"

          # Replace all placeholders in overlays and components
          find infrastructure/kubernetes/overlays infrastructure/kubernetes/components -name "*.yaml" \
            -exec sed -i "s|<account-id>|$ACCOUNT_ID|g" {} +
          find infrastructure/kubernetes/overlays infrastructure/kubernetes/components -name "*.yaml" \
            -exec sed -i "s|<acm-cert-arn>|$ACM_CERT_ARN|g" {} +
          find infrastructure/kubernetes/overlays infrastructure/kubernetes/components -name "*.yaml" \
            -exec sed -i "s|<rds-endpoint>|$RDS_ENDPOINT|g" {} +
          find infrastructure/kubernetes/overlays infrastructure/kubernetes/components -name "*.yaml" \
            -exec sed -i "s|<image-tag>|$IMAGE_TAG|g" {} +
          find infrastructure/kubernetes/overlays infrastructure/kubernetes/components -name "*.yaml" \
            -exec sed -i "s|<alb-sg-id>|$ALB_SG_ID|g" {} +

          # Resolve Glue role ARN (only exists if Glue runner is configured)
          GLUE_ROLE_ARN=$(aws iam get-role --role-name rideshare-glue-job \
            --query 'Role.Arn' --output text 2>/dev/null || true)
          if [ -n "$GLUE_ROLE_ARN" ]; then
            find infrastructure/kubernetes/overlays infrastructure/kubernetes/components -name "*.yaml" \
              -exec sed -i "s|<glue-role-arn>|$GLUE_ROLE_ARN|g" {} +
          fi

          # Resolve dbt-runner placeholder in ArgoCD app manifest
          sed -i "s|<dbt-runner>|${{ github.event.inputs.dbt_runner }}|g" \
            infrastructure/kubernetes/argocd/app-rideshare-platform.yaml

          # Verify no placeholders remain in deployment files (skip documentation)
          REMAINING=$(grep -r --include='*.yaml' '<account-id>\|<acm-cert-arn>\|<rds-endpoint>\|<image-tag>\|<alb-sg-id>\|<glue-role-arn>\|<dbt-runner>' \
            infrastructure/kubernetes/overlays/ infrastructure/kubernetes/components/ infrastructure/kubernetes/argocd/ || true)
          if [ -n "$REMAINING" ]; then
            echo "Error: Unresolved placeholders remain:"
            echo "$REMAINING"
            exit 1
          fi
          echo "All placeholders resolved successfully"

      - name: Package dbt project
        run: |
          tar -czf infrastructure/kubernetes/components/aws-production/dbt-project.tar.gz \
            --exclude='venv' --exclude='target' --exclude='logs' \
            --exclude='dbt_packages' --exclude='__pycache__' --exclude='.user.yml' \
            -C tools/dbt .

      - name: Package great-expectations project
        run: |
          tar -czf infrastructure/kubernetes/components/aws-production/ge-project.tar.gz \
            --exclude='venv' --exclude='__pycache__' --exclude='.mypy_cache' \
            --exclude='gx/uncommitted/validations' --exclude='gx/uncommitted/data_docs' \
            -C tools/great-expectations .

      - name: Push Deploy Branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B deploy
          git add infrastructure/kubernetes/overlays/ infrastructure/kubernetes/components/ infrastructure/kubernetes/argocd/
          git commit -m "deploy: resolve production values [skip ci]"
          git push --force origin deploy

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ steps.tf-outputs.outputs.cluster_name }} \
            --region us-east-1

      - name: Wait for EKS nodes to be ready
        run: |
          echo "Waiting for EKS nodes to reach Ready state..."
          kubectl wait --for=condition=Ready nodes --all --timeout=300s

      - name: Get Lambda URL and API key
        id: lambda-config
        run: |
          URL=$(aws lambda get-function-url-config \
            --function-name rideshare-auth-deploy \
            --query 'FunctionUrl' --output text)
          echo "url=$URL" >> "$GITHUB_OUTPUT"

          SECRET_RAW=$(aws secretsmanager get-secret-value \
            --secret-id "rideshare/api-key" \
            --query "SecretString" --output text)
          API_KEY=$(echo "$SECRET_RAW" | jq -r '.API_KEY // .' 2>/dev/null) || API_KEY="$SECRET_RAW"
          echo "::add-mask::$API_KEY"
          echo "api_key=$API_KEY" >> "$GITHUB_OUTPUT"

      - name: Create Application Databases
        run: |
          echo "Creating application databases in RDS..."
          POSTGRES_PASSWORD=$(aws secretsmanager get-secret-value \
            --secret-id rideshare/rds --query SecretString --output text | jq -r '.MASTER_PASSWORD')
          DATA_PIPELINE_CREDS=$(aws secretsmanager get-secret-value \
            --secret-id rideshare/data-pipeline --query SecretString --output text)
          RDS_ENDPOINT="${{ steps.tf-outputs.outputs.rds_endpoint }}"

          # CREATE DATABASE cannot use IF NOT EXISTS in PostgreSQL.
          # Run it and treat "already exists" (exit code 1) as success.
          # Use PGPASSWORD env var instead of embedding password in URI to avoid
          # percent-encoding issues with special characters (%, >, etc.).
          for DB in metastore airflow; do
            kubectl run "rds-init-${DB}" --rm -i --restart=Never --namespace=default \
              --image=postgres:16 --env="PGPASSWORD=${POSTGRES_PASSWORD}" -- \
              psql -h "${RDS_ENDPOINT}" -p 5432 -U postgres -d postgres \
              -c "CREATE DATABASE ${DB};" \
              && echo "${DB} database created" \
              || echo "${DB} database may already exist (expected on re-runs)"
          done

          # Create metastore application user (used by Hive Metastore service)
          METASTORE_PASSWORD=$(echo "$DATA_PIPELINE_CREDS" | jq -r '.POSTGRES_METASTORE_PASSWORD')
          echo "CREATE ROLE metastore WITH LOGIN PASSWORD '${METASTORE_PASSWORD}'; GRANT ALL PRIVILEGES ON DATABASE metastore TO metastore; GRANT ALL PRIVILEGES ON SCHEMA public TO metastore;" | \
            kubectl run rds-create-metastore-user --rm -i --restart=Never --namespace=default \
              --image=postgres:16 --env="PGPASSWORD=${POSTGRES_PASSWORD}" -- \
              psql -h "${RDS_ENDPOINT}" -p 5432 -U postgres -d metastore \
            && echo "Metastore user created" \
            || echo "Metastore user may already exist (expected on re-runs)"

          # Create airflow application user (used by Airflow webserver/scheduler)
          AIRFLOW_PASSWORD=$(echo "$DATA_PIPELINE_CREDS" | jq -r '.POSTGRES_AIRFLOW_PASSWORD')
          echo "CREATE ROLE airflow WITH LOGIN PASSWORD '${AIRFLOW_PASSWORD}'; GRANT ALL PRIVILEGES ON DATABASE airflow TO airflow; GRANT ALL PRIVILEGES ON SCHEMA public TO airflow;" | \
            kubectl run rds-create-airflow-user --rm -i --restart=Never --namespace=default \
              --image=postgres:16 --env="PGPASSWORD=${POSTGRES_PASSWORD}" -- \
              psql -h "${RDS_ENDPOINT}" -p 5432 -U postgres -d airflow \
            && echo "Airflow user created" \
            || echo "Airflow user may already exist (expected on re-runs)"

          echo "Application databases ready"

      - name: Generate Trino admin password hash
        run: |
          pip install bcrypt --quiet

          # Ensure the Trino secrets exist (created outside Terraform)
          for SECRET in rideshare/trino-admin-password-hash rideshare/trino-visitor-password-hash; do
            if ! aws secretsmanager describe-secret --secret-id "$SECRET" > /dev/null 2>&1; then
              aws secretsmanager create-secret --name "$SECRET" \
                --secret-string '{"hash":"placeholder"}' \
                --description "Trino password hash (auto-created by deploy)"
              echo "Created $SECRET"
            fi
          done

          TRINO_ADMIN_PW=$(aws secretsmanager get-secret-value \
            --secret-id rideshare/data-pipeline --query SecretString --output text | jq -r '.ADMIN_PASSWORD')
          export TRINO_ADMIN_PW
          ADMIN_HASH=$(python3 -c "
          import bcrypt, os
          pw = os.environ['TRINO_ADMIN_PW']
          print(bcrypt.hashpw(pw.encode(), bcrypt.gensalt(rounds=10)).decode())
          ")
          aws secretsmanager put-secret-value \
            --secret-id rideshare/trino-admin-password-hash \
            --secret-string "{\"hash\":\"${ADMIN_HASH}\"}"
          echo "Trino admin password hash stored in Secrets Manager"

      - name: Wait for ALB Controller or remove stale webhooks
        run: |
          echo "Waiting for ALB controller to be ready..."
          if ! kubectl wait --for=condition=available --timeout=120s \
            deployment/aws-load-balancer-controller -n kube-system 2>/dev/null; then
            echo "ALB controller not ready, removing stale webhooks to unblock deployments..."
            kubectl delete mutatingwebhookconfiguration aws-load-balancer-webhook 2>/dev/null || true
            kubectl delete validatingwebhookconfiguration aws-load-balancer-webhook 2>/dev/null || true
          fi

      - name: Install ArgoCD
        run: |
          # Check if ArgoCD is already installed
          if kubectl get namespace argocd &> /dev/null; then
            echo "ArgoCD namespace already exists, skipping installation"
          else
            echo "Installing ArgoCD..."
            kubectl create namespace argocd
            kubectl apply -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/v3.2.3/manifests/install.yaml
          fi

          # Wait for ArgoCD server to be ready
          echo "Waiting for ArgoCD server..."
          kubectl wait --for=condition=available --timeout=300s \
            deployment/argocd-server -n argocd

      - name: Configure ArgoCD kustomize build options
        run: |
          kubectl patch configmap argocd-cm -n argocd --type merge \
            -p '{"data":{"kustomize.buildOptions":"--load-restrictor=LoadRestrictionsNone"}}'

      - name: Apply ArgoCD Application
        run: |
          kubectl apply -f infrastructure/kubernetes/argocd/app-rideshare-platform.yaml

          echo "ArgoCD application created. Syncing..."
          kubectl get applications -n argocd

      - name: Wait for ArgoCD namespace creation
        run: |
          NS="rideshare-prod"
          echo "Waiting for ArgoCD to create namespace '$NS'..."
          for i in $(seq 1 60); do
            if kubectl get namespace "$NS" &> /dev/null; then
              echo "Namespace '$NS' exists (attempt $i)"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "::error::Namespace '$NS' was not created after 5 minutes"
              exit 1
            fi
            sleep 5
          done

          echo "Waiting for initial resources to appear in '$NS'..."
          for i in $(seq 1 36); do
            RESOURCE_COUNT=$(kubectl get deployments,statefulsets -n "$NS" --no-headers 2>/dev/null | wc -l)
            if [ "$RESOURCE_COUNT" -gt 0 ]; then
              echo "Found $RESOURCE_COUNT resources in '$NS' (attempt $i)"
              break
            fi
            if [ "$i" -eq 36 ]; then
              echo "::error::No resources appeared in '$NS' after 3 minutes"
              exit 1
            fi
            sleep 5
          done

      - name: Wait for EKS convergence
        env:
          LAMBDA_URL: ${{ steps.lambda-config.outputs.url }}
          API_KEY: ${{ steps.lambda-config.outputs.api_key }}
        run: |
          NS="rideshare-prod"

          report_ready() {
            local svc="$1"
            echo "  ✓ $svc ready"
            curl -s -X POST "${LAMBDA_URL}" \
              -H "Content-Type: application/json" \
              -d "{\"action\":\"report-deploy-progress\",\"api_key\":\"${API_KEY}\",\"service\":\"${svc}\",\"ready\":true}" \
              > /dev/null || echo "  Warning: Failed to report $svc ready"
          }

          # wait_and_mark: wait for a k8s resource, then touch a marker file.
          # report_ready calls run sequentially after each phase to avoid
          # read-modify-write races on the shared SSM session JSON.
          READY_DIR=$(mktemp -d)
          wait_and_mark() {
            local svc="$1"; shift
            if kubectl "$@"; then
              touch "$READY_DIR/$svc"
            fi
          }

          report_phase() {
            for svc in "$@"; do
              if [ -f "$READY_DIR/$svc" ]; then
                report_ready "$svc"
              else
                echo "  ✗ $svc not ready (skipping report)"
              fi
            done
          }

          # When dbt_runner is not glue, auto-report glue-catalog as ready immediately
          if [ "${{ github.event.inputs.dbt_runner }}" != "glue" ]; then
            report_ready "glue-catalog"
          fi

          echo "=== Phase 1: Infrastructure ==="
          wait_and_mark kafka wait --for=condition=ready pod/kafka-0 -n "$NS" --timeout=300s &
          wait_and_mark redis wait --for=condition=available deployment/redis -n "$NS" --timeout=300s &
          wait_and_mark prometheus wait --for=condition=available deployment/prometheus -n "$NS" --timeout=300s &
          wait_and_mark loki wait --for=condition=available deployment/loki -n "$NS" --timeout=300s &
          wait_and_mark tempo wait --for=condition=available deployment/tempo -n "$NS" --timeout=300s &
          kubectl wait --for=condition=available deployment/otel-collector -n "$NS" --timeout=300s 2>/dev/null &
          wait || true
          report_phase kafka redis prometheus loki tempo
          echo "Phase 1 complete"

          echo "=== Phase 2: Schema/Config ==="
          wait_and_mark schema-registry wait --for=condition=available deployment/schema-registry -n "$NS" --timeout=300s || true
          report_phase schema-registry
          echo "Phase 2 complete"

          echo "=== Phase 3: Application ==="
          wait_and_mark stream-processor wait --for=condition=available deployment/stream-processor -n "$NS" --timeout=300s &
          wait_and_mark osrm wait --for=condition=available deployment/osrm -n "$NS" --timeout=600s &
          wait_and_mark simulation wait --for=condition=available deployment/simulation -n "$NS" --timeout=600s &
          wait_and_mark bronze-ingestion wait --for=condition=available deployment/bronze-ingestion -n "$NS" --timeout=300s &
          wait_and_mark trino wait --for=condition=available deployment/trino -n "$NS" --timeout=300s &
          wait || true
          report_phase stream-processor osrm simulation bronze-ingestion trino
          echo "Phase 3 complete"

          echo "=== Phase 4: Data Pipeline ==="
          wait_and_mark airflow wait --for=condition=available deployment/airflow-webserver -n "$NS" --timeout=300s || true
          report_phase airflow
          echo "Phase 4 complete"

          echo "=== Phase 4.5: Glue Catalog ==="
          if [ "${{ github.event.inputs.dbt_runner }}" = "glue" ]; then
            GLUE_OK=true
            for DB in rideshare_bronze rideshare_silver rideshare_gold; do
              if ! aws glue get-database --name "$DB" > /dev/null 2>&1; then
                echo "  Warning: Glue database $DB not accessible"
                GLUE_OK=false
              fi
            done
            if [ "$GLUE_OK" = "true" ]; then
              report_ready "glue-catalog"
            else
              echo "  glue-catalog not ready (skipping report)"
            fi
          fi
          echo "Phase 4.5 complete"

          echo "=== Phase 5: UI/Observability ==="
          wait_and_mark grafana wait --for=condition=available deployment/grafana -n "$NS" --timeout=300s &
          wait_and_mark performance-controller wait --for=condition=available deployment/performance-controller -n "$NS" --timeout=300s &
          wait_and_mark control-panel wait --for=condition=available deployment/control-panel -n "$NS" --timeout=300s &
          wait || true
          report_phase grafana performance-controller control-panel
          echo "Phase 5 complete"

          rm -rf "$READY_DIR"

          echo "All services converged"

      - name: Ensure auto-teardown session
        env:
          LAMBDA_URL: ${{ steps.lambda-config.outputs.url }}
          API_KEY: ${{ steps.lambda-config.outputs.api_key }}
        run: |
          echo "Ensuring auto-teardown session exists..."
          RESPONSE=$(curl -sf -w "\n%{http_code}" -X POST "${LAMBDA_URL}" \
            -H "Content-Type: application/json" \
            -d "{\"action\":\"ensure-session\",\"api_key\":\"${API_KEY}\"}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)

          if [ "$HTTP_CODE" = "200" ]; then
            CREATED=$(echo "$BODY" | jq -r '.created // false' 2>/dev/null)
            DEADLINE=$(echo "$BODY" | jq -r '.deadline // "unknown"' 2>/dev/null)
            REMAINING=$(echo "$BODY" | jq -r '.remaining_seconds // 0' 2>/dev/null)
            if [ "$CREATED" = "true" ]; then
              echo "Created new auto-teardown session (deadline epoch: ${DEADLINE}, ${REMAINING}s remaining)"
            else
              echo "Auto-teardown session already exists (deadline epoch: ${DEADLINE}, ${REMAINING}s remaining)"
            fi
          else
            echo "::warning::Failed to ensure auto-teardown session (HTTP ${HTTP_CODE}). Platform may need manual teardown."
            echo "Response: ${BODY}"
          fi

      - name: Re-provision visitor accounts
        env:
          LAMBDA_URL: ${{ steps.lambda-config.outputs.url }}
          API_KEY: ${{ steps.lambda-config.outputs.api_key }}
        run: |
          echo "Re-provisioning visitor accounts from DynamoDB..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${LAMBDA_URL}" \
            -H "Content-Type: application/json" \
            -d "{\"action\":\"reprovision-visitors\",\"api_key\":\"${API_KEY}\"}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)

          echo "Re-provisioning response: ${HTTP_CODE}"
          echo "${BODY}" | jq . 2>/dev/null || echo "${BODY}"

          if [ "$HTTP_CODE" = "200" ]; then
            PROVISIONED=$(echo "$BODY" | jq -r '.provisioned // 0' 2>/dev/null || echo "0")
            echo "Re-provisioned ${PROVISIONED} visitor account(s)"
          elif [ "$HTTP_CODE" = "207" ]; then
            FAILED=$(echo "$BODY" | jq -r '.failed // 0' 2>/dev/null || echo "unknown")
            echo "::warning::Re-provisioning completed with ${FAILED} failure(s) — some visitor accounts may need manual re-provisioning"
          else
            echo "::warning::Re-provisioning returned HTTP ${HTTP_CODE} — visitor accounts may need manual re-provisioning after deploy"
          fi

      - name: Get Load Balancer URL
        id: alb-url
        run: |
          echo "Waiting for ALB to be provisioned (up to 5 minutes)..."
          ALB_HOSTNAME=""
          for i in $(seq 1 30); do
            ALB_HOSTNAME=$(kubectl get ingress rideshare-api-ingress -n rideshare-prod \
              -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)
            if [ -n "$ALB_HOSTNAME" ]; then
              echo "ALB provisioned at: $ALB_HOSTNAME"
              break
            fi
            echo "Attempt $i/30: ALB not ready yet, waiting 10s..."
            sleep 10
          done

          if [ -z "$ALB_HOSTNAME" ]; then
            echo "Warning: ALB hostname not available after 5 minutes"
            ALB_HOSTNAME="pending"
          fi

          echo "alb_hostname=$ALB_HOSTNAME" >> "$GITHUB_OUTPUT"

      - name: Create Route 53 Wildcard Record
        if: steps.alb-url.outputs.alb_hostname != 'pending'
        run: |
          ALB_HOSTNAME="${{ steps.alb-url.outputs.alb_hostname }}"

          ZONE_ID=$(aws route53 list-hosted-zones-by-name \
            --dns-name ridesharing.portfolio.andresbrocco.com \
            --query 'HostedZones[0].Id' \
            --output text | sed 's|/hostedzone/||')

          if [ -z "$ZONE_ID" ]; then
            echo "Error: Could not find hosted zone"
            exit 1
          fi

          ALB_ZONE_ID=$(aws elbv2 describe-load-balancers \
            --query "LoadBalancers[?DNSName=='$ALB_HOSTNAME'].CanonicalHostedZoneId" \
            --output text)

          if [ -z "$ALB_ZONE_ID" ]; then
            echo "Error: Could not determine ALB hosted zone ID"
            exit 1
          fi

          echo "Creating Route 53 wildcard ALIAS record..."
          echo "  Zone ID: $ZONE_ID"
          echo "  ALB Hostname: $ALB_HOSTNAME"
          echo "  ALB Zone ID: $ALB_ZONE_ID"

          aws route53 change-resource-record-sets --hosted-zone-id "$ZONE_ID" \
            --change-batch "{
              \"Changes\": [{
                \"Action\": \"UPSERT\",
                \"ResourceRecordSet\": {
                  \"Name\": \"*.ridesharing.portfolio.andresbrocco.com\",
                  \"Type\": \"A\",
                  \"AliasTarget\": {
                    \"HostedZoneId\": \"$ALB_ZONE_ID\",
                    \"DNSName\": \"$ALB_HOSTNAME\",
                    \"EvaluateTargetHealth\": true
                  }
                }
              }]
            }"

          echo "Route 53 wildcard record created: *.ridesharing.portfolio.andresbrocco.com -> $ALB_HOSTNAME"

      - name: Deployment Summary
        run: |
          echo "================================"
          echo "Platform Deployment Complete"
          echo "================================"
          echo ""
          echo "EKS Cluster: ${{ steps.tf-outputs.outputs.cluster_name }}"
          echo "Cluster Endpoint: ${{ steps.tf-outputs.outputs.cluster_endpoint }}"
          echo "ALB Hostname: ${{ steps.alb-url.outputs.alb_hostname }}"
          echo "DBT Runner:      ${{ github.event.inputs.dbt_runner }}"
          echo ""
          echo "Landing Page:    https://ridesharing.portfolio.andresbrocco.com"
          echo "Control Panel:   https://control-panel.ridesharing.portfolio.andresbrocco.com"
          echo "API URL:         https://api.ridesharing.portfolio.andresbrocco.com"
          echo "Grafana:         https://grafana.ridesharing.portfolio.andresbrocco.com"
          echo "Airflow:      https://airflow.ridesharing.portfolio.andresbrocco.com"
          echo "Trino:        https://trino.ridesharing.portfolio.andresbrocco.com"
          echo "Prometheus:   https://prometheus.ridesharing.portfolio.andresbrocco.com"
          echo ""
          echo "Estimated cost: ~$0.31/hour while running"
          echo "Remember to run teardown workflow when demo is complete"
          echo "================================"

  deploy-frontend:
    if: contains(fromJSON('["deploy-all", "deploy-frontend"]'), github.event.inputs.action)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/control-panel/package-lock.json

      - name: Install dependencies
        working-directory: services/control-panel
        run: npm ci

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/rideshare-github-actions
          aws-region: us-east-1

      - name: Get Lambda function URL
        id: lambda
        run: |
          URL=$(aws lambda get-function-url-config \
            --function-name rideshare-auth-deploy \
            --query 'FunctionUrl' --output text)
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Build React app with production environment variables
        working-directory: services/control-panel
        env:
          VITE_API_URL: https://api.ridesharing.portfolio.andresbrocco.com
          VITE_WS_URL: wss://api.ridesharing.portfolio.andresbrocco.com/ws
          VITE_LAMBDA_URL: ${{ steps.lambda.outputs.url }}
        run: npm run build

      - name: Sync build output to S3
        working-directory: services/control-panel
        run: |
          BUCKET="rideshare-${{ secrets.AWS_ACCOUNT_ID }}-frontend"

          aws s3 sync dist/ "s3://${BUCKET}/" \
            --delete \
            --cache-control "public, max-age=31536000" \
            --exclude "index.html" \
            --exclude "*.html"

          aws s3 sync dist/ "s3://${BUCKET}/" \
            --exclude "*" \
            --include "*.html" \
            --cache-control "public, max-age=0, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          DISTRIBUTION_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Comment=='Frontend SPA distribution'].Id" \
            --output text)

          if [ -z "$DISTRIBUTION_ID" ]; then
            echo "Error: CloudFront distribution not found"
            exit 1
          fi

          aws cloudfront create-invalidation \
            --distribution-id "$DISTRIBUTION_ID" \
            --paths "/*"

      - name: Output deployment summary
        run: |
          echo "Frontend deployed to S3 and CloudFront cache invalidated"
          echo "Landing Page:  https://ridesharing.portfolio.andresbrocco.com"
          echo "Control Panel: https://control-panel.ridesharing.portfolio.andresbrocco.com (via ALB/EKS)"
