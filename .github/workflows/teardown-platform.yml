name: Teardown Platform

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  teardown-platform:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.3

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/rideshare-github-actions
          aws-region: us-east-1

      - name: Get Lambda URL and API key
        id: lambda-config
        run: |
          URL=$(aws lambda get-function-url-config \
            --function-name rideshare-auth-deploy \
            --query 'FunctionUrl' --output text 2>/dev/null) || true
          echo "url=$URL" >> "$GITHUB_OUTPUT"

          SECRET_RAW=$(aws secretsmanager get-secret-value \
            --secret-id "rideshare/api-key" \
            --query "SecretString" --output text 2>/dev/null) || true
          API_KEY=$(echo "$SECRET_RAW" | jq -r '.API_KEY // .' 2>/dev/null) || API_KEY="$SECRET_RAW"
          echo "::add-mask::$API_KEY"
          echo "api_key=$API_KEY" >> "$GITHUB_OUTPUT"

      - name: Register teardown run ID
        run: |
          curl -sf -X POST "${{ steps.lambda-config.outputs.url }}" \
            -H "Content-Type: application/json" \
            -d '{"action":"set-teardown-run-id","api_key":"${{ steps.lambda-config.outputs.api_key }}","run_id":${{ github.run_id }}}' \
            || echo "Warning: Failed to register run ID"

      - name: Terraform Init (Platform)
        working-directory: infrastructure/terraform/platform
        run: |
          terraform init \
            -backend-config="bucket=rideshare-tf-state-${{ secrets.AWS_ACCOUNT_ID }}"

      - name: Graceful Simulation Shutdown
        run: |
          SIM_API="https://api.ridesharing.portfolio.andresbrocco.com"

          # 1. Fetch API key from Secrets Manager
          SECRET_RAW=$(aws secretsmanager get-secret-value --secret-id "rideshare/api-key" --query "SecretString" --output text 2>/dev/null) || { echo "Warning: Could not fetch API key, skipping graceful shutdown"; exit 0; }
          API_KEY=$(echo "$SECRET_RAW" | jq -r '.API_KEY // .' 2>/dev/null) || API_KEY="$SECRET_RAW"
          if [ -z "$API_KEY" ]; then
            echo "Warning: Empty API key, skipping graceful shutdown"
            exit 0
          fi

          # 3. Check simulation status
          SIM_STATUS=$(curl -sf --max-time 10 -H "X-API-Key: $API_KEY" "$SIM_API/simulation/status" 2>/dev/null) || { echo "Warning: Simulation API unreachable, skipping graceful shutdown"; exit 0; }
          STATE=$(echo "$SIM_STATUS" | jq -r '.state // empty')
          echo "Current simulation state: $STATE"
          if [ "$STATE" != "running" ]; then
            echo "Simulation not running (state=$STATE), skipping pause"
            exit 0
          fi

          # 4. Pause simulation (enters DRAINING)
          curl -sf --max-time 10 -X POST -H "X-API-Key: $API_KEY" "$SIM_API/simulation/pause" || { echo "Warning: Failed to pause simulation"; exit 0; }
          echo "Pause requested"

          # 5. Speed up if slow
          SPEED=$(echo "$SIM_STATUS" | jq -r '.speed_multiplier // 1')
          if [ "$(echo "$SPEED < 16" | bc -l)" = "1" ]; then
            curl -sf --max-time 10 -X PUT -H "X-API-Key: $API_KEY" -H "Content-Type: application/json" \
              -d '{"multiplier": 16}' "$SIM_API/simulation/speed" || echo "Warning: Failed to set speed"
          fi

          # 6. Enable PID controller
          curl -sf --max-time 10 -X PUT -H "X-API-Key: $API_KEY" -H "Content-Type: application/json" \
            -d '{"mode": "on"}' "$SIM_API/controller/mode" || echo "Warning: Failed to enable controller"

          # 7. Poll until paused (5 min timeout)
          ELAPSED=0
          while [ $ELAPSED -lt 300 ]; do
            sleep 10
            ELAPSED=$((ELAPSED + 10))
            POLL=$(curl -sf --max-time 10 -H "X-API-Key: $API_KEY" "$SIM_API/simulation/status" 2>/dev/null) || { echo "Warning: Poll failed at ${ELAPSED}s"; continue; }
            POLL_STATE=$(echo "$POLL" | jq -r '.state // empty')
            POLL_SPEED=$(echo "$POLL" | jq -r '.speed_multiplier // empty')
            POLL_TRIPS=$(echo "$POLL" | jq -r '.active_trips // empty')
            echo "  [${ELAPSED}s] state=$POLL_STATE speed=$POLL_SPEED active_trips=$POLL_TRIPS"
            if [ "$POLL_STATE" = "paused" ] || [ "$POLL_STATE" = "stopped" ]; then
              echo "Simulation gracefully stopped (state=$POLL_STATE)"
              exit 0
            fi
          done
          echo "Warning: Timed out waiting for simulation to pause (300s), continuing teardown"
          exit 0

      - name: Delete Route 53 Wildcard Record
        run: |
          ZONE_ID=$(aws route53 list-hosted-zones-by-name \
            --dns-name ridesharing.portfolio.andresbrocco.com \
            --query 'HostedZones[0].Id' \
            --output text | sed 's|/hostedzone/||')

          if [ -z "$ZONE_ID" ]; then
            echo "Warning: Hosted zone not found, skipping DNS cleanup"
            exit 0
          fi

          # Get the current wildcard record (need full details for DELETE)
          WILDCARD_RECORD=$(aws route53 list-resource-record-sets \
            --hosted-zone-id "$ZONE_ID" \
            --query "ResourceRecordSets[?Name=='\\*.ridesharing.portfolio.andresbrocco.com.'] | [0]" \
            --output json)

          if [ "$WILDCARD_RECORD" = "null" ] || [ -z "$WILDCARD_RECORD" ]; then
            echo "No wildcard Route 53 record found, nothing to delete"
          else
            echo "Deleting wildcard Route 53 record..."
            aws route53 change-resource-record-sets --hosted-zone-id "$ZONE_ID" \
              --change-batch "{
                \"Changes\": [{
                  \"Action\": \"DELETE\",
                  \"ResourceRecordSet\": $WILDCARD_RECORD
                }]
              }"
            echo "Route 53 wildcard record deleted"
          fi

      - name: Terraform Destroy (Platform)
        working-directory: infrastructure/terraform/platform
        run: terraform destroy -auto-approve

      - name: Clean Up Orphaned ALB Resources
        if: always()
        run: |
          echo "Cleaning up ALB resources created by AWS Load Balancer Controller..."

          # 1. Find ALBs tagged by the ALB controller for our cluster
          ALL_ALBS=$(aws elbv2 describe-load-balancers \
            --query 'LoadBalancers[*].LoadBalancerArn' --output text)

          if [ -z "$ALL_ALBS" ]; then
            echo "No ALBs found in account"
          else
            CLUSTER_ALBS=""
            for ALB_ARN in $ALL_ALBS; do
              TAGS=$(aws elbv2 describe-tags --resource-arns "$ALB_ARN" \
                --query "TagDescriptions[0].Tags[?Key=='elbv2.k8s.aws/cluster' && Value=='rideshare-eks'].Value" \
                --output text 2>/dev/null)
              if [ -n "$TAGS" ]; then
                CLUSTER_ALBS="$CLUSTER_ALBS $ALB_ARN"
              fi
            done

            if [ -z "$CLUSTER_ALBS" ]; then
              echo "No ALBs tagged for rideshare-eks cluster"
            else
              for ALB_ARN in $CLUSTER_ALBS; do
                echo "Processing ALB: $ALB_ARN"

                # 2. Delete listeners
                LISTENERS=$(aws elbv2 describe-listeners --load-balancer-arn "$ALB_ARN" \
                  --query 'Listeners[*].ListenerArn' --output text 2>/dev/null)
                for LISTENER_ARN in $LISTENERS; do
                  aws elbv2 delete-listener --listener-arn "$LISTENER_ARN" \
                    && echo "  Deleted listener: $LISTENER_ARN" \
                    || echo "  Warning: Failed to delete listener $LISTENER_ARN"
                done

                # 3. Delete ALB
                aws elbv2 delete-load-balancer --load-balancer-arn "$ALB_ARN" \
                  && echo "  Deleted ALB: $ALB_ARN" \
                  || echo "  Warning: Failed to delete ALB $ALB_ARN"
              done
            fi
          fi

          # 4. Delete target groups tagged for our cluster
          ALL_TGS=$(aws elbv2 describe-target-groups \
            --query 'TargetGroups[*].TargetGroupArn' --output text)
          if [ -n "$ALL_TGS" ]; then
            for TG_ARN in $ALL_TGS; do
              TAGS=$(aws elbv2 describe-tags --resource-arns "$TG_ARN" \
                --query "TagDescriptions[0].Tags[?Key=='elbv2.k8s.aws/cluster' && Value=='rideshare-eks'].Value" \
                --output text 2>/dev/null)
              if [ -n "$TAGS" ]; then
                aws elbv2 delete-target-group --target-group-arn "$TG_ARN" \
                  && echo "Deleted target group: $TG_ARN" \
                  || echo "Warning: Failed to delete target group $TG_ARN"
              fi
            done
          fi

          # 5. Wait for ALB ENIs to be released (up to 3 min)
          echo "Waiting for ALB ENIs to release..."
          for i in $(seq 1 18); do
            ENIS=$(aws ec2 describe-network-interfaces \
              --filters "Name=description,Values=*k8s-rideshare*" \
              --query 'NetworkInterfaces[*].NetworkInterfaceId' --output text 2>/dev/null)
            if [ -z "$ENIS" ]; then
              echo "All ALB ENIs released"
              break
            fi
            echo "  [${i}0s] ENIs still present: $ENIS"
            if [ "$i" -eq 18 ]; then
              echo "Warning: ENIs not released after 3 minutes, continuing"
            fi
            sleep 10
          done

          # 6. Release unassociated EIPs without a Name tag (ALB controller artifacts)
          EIPS=$(aws ec2 describe-addresses \
            --query 'Addresses[?AssociationId==`null`].[AllocationId,Tags]' --output json)
          echo "$EIPS" | jq -c '.[]' 2>/dev/null | while read -r EIP_ENTRY; do
            ALLOC_ID=$(echo "$EIP_ENTRY" | jq -r '.[0]')
            HAS_NAME=$(echo "$EIP_ENTRY" | jq -r '.[1] // [] | map(select(.Key=="Name")) | length')
            if [ "$HAS_NAME" = "0" ]; then
              aws ec2 release-address --allocation-id "$ALLOC_ID" \
                && echo "Released EIP: $ALLOC_ID" \
                || echo "Warning: Failed to release EIP $ALLOC_ID"
            fi
          done

          # 7. Delete orphaned security groups tagged by ALB controller
          SG_IDS=$(aws ec2 describe-security-groups \
            --filters "Name=tag-key,Values=elbv2.k8s.aws/cluster" \
            --query 'SecurityGroups[*].GroupId' --output text 2>/dev/null)
          if [ -n "$SG_IDS" ]; then
            for SG_ID in $SG_IDS; do
              aws ec2 delete-security-group --group-id "$SG_ID" \
                && echo "Deleted security group: $SG_ID" \
                || echo "Warning: Failed to delete security group $SG_ID"
            done
          fi

          echo "ALB cleanup complete"

      - name: Clean Up Orphaned EBS Volumes
        run: |
          echo "Deleting orphaned EBS volumes from destroyed EKS cluster..."
          ORPHANED=$(aws ec2 describe-volumes \
            --filters "Name=status,Values=available" \
                      "Name=tag:kubernetes.io/cluster/rideshare-eks,Values=owned" \
            --query 'Volumes[*].VolumeId' --output text)

          if [ -z "$ORPHANED" ]; then
            echo "No orphaned volumes found"
          else
            COUNT=0
            for VOL_ID in $ORPHANED; do
              aws ec2 delete-volume --volume-id "$VOL_ID" && COUNT=$((COUNT + 1)) \
                || echo "Warning: Failed to delete $VOL_ID"
            done
            echo "Deleted $COUNT orphaned EBS volume(s)"
          fi

      - name: Verify Route 53 Wildcard Record Removed
        run: |
          ZONE_ID=$(aws route53 list-hosted-zones-by-name \
            --dns-name ridesharing.portfolio.andresbrocco.com \
            --query 'HostedZones[0].Id' \
            --output text | sed 's|/hostedzone/||')

          if [ -z "$ZONE_ID" ]; then
            echo "Warning: Hosted zone not found"
            exit 0
          fi

          WILDCARD_RECORD=$(aws route53 list-resource-record-sets \
            --hosted-zone-id "$ZONE_ID" \
            --query "ResourceRecordSets[?Name=='\\*.ridesharing.portfolio.andresbrocco.com.']" \
            --output json)

          if [ "$WILDCARD_RECORD" = "[]" ]; then
            echo "Verified: wildcard Route 53 record removed"
          else
            echo "Error: wildcard Route 53 record still exists after deletion attempt"
            echo "$WILDCARD_RECORD"
            exit 1
          fi

      - name: Verify Foundation Resources Preserved
        run: |
          echo "Verifying foundation resources are intact..."

          ACCT="${{ secrets.AWS_ACCOUNT_ID }}"
          echo "Checking S3 buckets..."
          aws s3 ls | grep "rideshare-${ACCT}-bronze" && echo "Bronze bucket preserved" || echo "Bronze bucket missing"
          aws s3 ls | grep "rideshare-${ACCT}-silver" && echo "Silver bucket preserved" || echo "Silver bucket missing"
          aws s3 ls | grep "rideshare-${ACCT}-gold" && echo "Gold bucket preserved" || echo "Gold bucket missing"
          aws s3 ls | grep "rideshare-${ACCT}-checkpoints" && echo "Checkpoints bucket preserved" || echo "Checkpoints bucket missing"
          aws s3 ls | grep "rideshare-${ACCT}-build-assets" && echo "Build-assets bucket preserved" || echo "Build-assets bucket missing"
          aws s3 ls | grep "rideshare-${ACCT}-frontend" && echo "Frontend bucket preserved" || echo "Frontend bucket missing"

          echo "Checking ECR repositories..."
          ECR_COUNT=$(aws ecr describe-repositories \
            --query "repositories[?contains(repositoryName, \`rideshare\`)].repositoryName" \
            --output json | jq '. | length')
          echo "$ECR_COUNT ECR repositories preserved"

          echo "Checking Secrets Manager..."
          SECRET_COUNT=$(aws secretsmanager list-secrets \
            --query "SecretList[?contains(Name, \`rideshare\`)].Name" \
            --output json | jq '. | length')
          echo "$SECRET_COUNT secrets preserved"

          echo "Checking CloudFront..."
          DISTRIBUTION=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Comment=='Frontend SPA distribution'].Id" \
            --output text)
          if [ -n "$DISTRIBUTION" ]; then
            echo "CloudFront distribution preserved (ID: $DISTRIBUTION)"
          else
            echo "CloudFront distribution not found"
          fi

      - name: Teardown Summary
        run: |
          echo "================================"
          echo "Platform Teardown Complete"
          echo "================================"
          echo ""
          echo "DESTROYED:"
          echo "  - EKS Cluster (rideshare-prod)"
          echo "  - EC2 Instances (3x t3.xlarge worker nodes)"
          echo "  - RDS PostgreSQL (t4g.micro)"
          echo "  - ALB (Application Load Balancer)"
          echo "  - EBS Volumes (Kafka, Prometheus data)"
          echo "  - Route 53 wildcard record"
          echo ""
          echo "PRESERVED:"
          echo "  - S3 Buckets (lakehouse data, checkpoints, build-assets, frontend)"
          echo "  - ECR Images (all service images)"
          echo "  - Secrets Manager (all credentials)"
          echo "  - Route 53 Hosted Zone"
          echo "  - CloudFront Distribution"
          echo "  - ACM Certificate"
          echo ""
          echo "Frontend remains accessible at:"
          echo "  https://ridesharing.portfolio.andresbrocco.com"
          echo "  (Offline mode - API unavailable)"
          echo ""
          echo "Cost reduced to foundation-only: ~$8/month"
          echo "================================"

      - name: Alert on teardown failure
        if: failure()
        run: |
          echo "Teardown failed — sending alert email..."

          ADMIN_SECRET=$(aws secretsmanager get-secret-value \
            --secret-id "rideshare/admin-user" \
            --query "SecretString" --output text 2>/dev/null) || { echo "Warning: Could not fetch admin secret, skipping alert"; exit 0; }
          ADMIN_EMAIL=$(echo "$ADMIN_SECRET" | jq -r '.EMAIL // empty')
          if [ -z "$ADMIN_EMAIL" ]; then
            echo "Warning: No admin email found, skipping alert"
            exit 0
          fi

          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          aws ses send-email \
            --from "noreply@ridesharing.portfolio.andresbrocco.com" \
            --destination "ToAddresses=$ADMIN_EMAIL" \
            --message "{
              \"Subject\": {\"Data\": \"Rideshare Platform Teardown Failed\"},
              \"Body\": {\"Text\": {\"Data\": \"The teardown workflow failed. Orphaned resources may still be running and incurring costs.\n\nWorkflow run: $RUN_URL\n\nPlease investigate and re-run the teardown or manually clean up resources.\"}}
            }" \
            && echo "Alert email sent to admin" \
            || echo "Warning: Failed to send alert email"

      - name: Clean up session
        if: always()
        run: |
          # Primary: call Lambda to cleanly delete session + EventBridge schedule
          LAMBDA_URL="${{ steps.lambda-config.outputs.url }}"
          API_KEY="${{ steps.lambda-config.outputs.api_key }}"
          if [ -n "$LAMBDA_URL" ] && [ -n "$API_KEY" ]; then
            curl -sf -X POST "$LAMBDA_URL" \
              -H "Content-Type: application/json" \
              -d "{\"action\":\"complete-teardown\",\"api_key\":\"$API_KEY\"}" \
              && echo "Session cleaned up via Lambda" \
              || echo "Note: Lambda cleanup call failed"
          fi
          # Fallback: direct SSM delete in case Lambda is unreachable (infra destroyed)
          aws ssm delete-parameter --name "/rideshare/session/deadline" 2>&1 \
            || echo "Note: session parameter may already be deleted"
