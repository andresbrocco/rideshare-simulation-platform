name: Deploy Landing Page

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  detect-changes:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      control-panel: ${{ steps.filter.outputs.control-panel }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 2
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            control-panel:
              - 'services/control-panel/**'

  deploy-landing-page:
    needs: [detect-changes]
    if: >-
      always() && (
        github.event_name == 'workflow_dispatch' ||
        (github.event.workflow_run.conclusion == 'success' && needs.detect-changes.outputs.control-panel == 'true')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/control-panel/package-lock.json

      - name: Install dependencies
        working-directory: services/control-panel
        run: npm ci

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/rideshare-github-actions
          aws-region: us-east-1

      - name: Get Lambda function URL
        id: lambda
        run: |
          URL=$(aws lambda get-function-url-config \
            --function-name rideshare-auth-deploy \
            --query 'FunctionUrl' --output text)
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Get Chat Lambda function URL
        id: chat-lambda
        run: |
          URL=$(aws lambda get-function-url-config \
            --function-name rideshare-ai-chat \
            --query 'FunctionUrl' --output text)
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Build React app with production environment variables
        working-directory: services/control-panel
        env:
          VITE_API_URL: https://api.ridesharing.portfolio.andresbrocco.com
          VITE_WS_URL: wss://api.ridesharing.portfolio.andresbrocco.com/ws
          VITE_LAMBDA_URL: ${{ steps.lambda.outputs.url }}
          VITE_CHAT_LAMBDA_URL: ${{ steps.chat-lambda.outputs.url }}
        run: npm run build

      - name: Sync build output to S3
        working-directory: services/control-panel
        run: |
          BUCKET="rideshare-${{ secrets.AWS_ACCOUNT_ID }}-frontend"

          aws s3 sync dist/ "s3://${BUCKET}/" \
            --delete \
            --cache-control "public, max-age=31536000" \
            --exclude "index.html" \
            --exclude "*.html"

          aws s3 sync dist/ "s3://${BUCKET}/" \
            --exclude "*" \
            --include "*.html" \
            --cache-control "public, max-age=0, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          DISTRIBUTION_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Comment=='Frontend SPA distribution'].Id" \
            --output text)

          if [ -z "$DISTRIBUTION_ID" ]; then
            echo "Error: CloudFront distribution not found"
            exit 1
          fi

          aws cloudfront create-invalidation \
            --distribution-id "$DISTRIBUTION_ID" \
            --paths "/*"

      - name: Output deployment summary
        run: |
          echo "Frontend deployed to S3 and CloudFront cache invalidated"
          echo "Landing Page:  https://ridesharing.portfolio.andresbrocco.com"
          echo "Control Panel: https://control-panel.ridesharing.portfolio.andresbrocco.com (via ALB/EKS)"
