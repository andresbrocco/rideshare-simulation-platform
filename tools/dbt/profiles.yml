rideshare:
  target: duckdb

  outputs:
    duckdb:
      type: duckdb
      path: "{{ env_var('DUCKDB_PATH', '/tmp/rideshare.duckdb') }}"
      extensions:
        - delta
        - httpfs
      secrets:
        - type: S3
          provider: "{{ env_var('DBT_S3_PROVIDER', 'config') }}"
          key_id: "{{ env_var('AWS_ACCESS_KEY_ID', 'minioadmin') }}"
          secret: "{{ env_var('AWS_SECRET_ACCESS_KEY', 'minioadmin') }}"
          endpoint: "{{ env_var('S3_ENDPOINT', 'minio:9000') }}"
          use_ssl: "false"
          url_style: path
          region: "{{ env_var('AWS_REGION', 'us-east-1') }}"
        - type: S3
          provider: credential_chain
      threads: 4

    glue:
      type: glue
      role_arn: "{{ env_var('GLUE_ROLE_ARN') }}"
      region: "{{ env_var('AWS_REGION', 'sa-east-1') }}"
      workers: 2
      worker_type: G.1X
      glue_version: "4.0"
      database: rideshare_silver
      threads: 4
