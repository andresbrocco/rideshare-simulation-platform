<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Three vertical slider tracks -->
  <line x1="25" y1="15" x2="25" y2="85" stroke="#00FF88" stroke-width="4" stroke-linecap="round"/>
  <line x1="50" y1="15" x2="50" y2="85" stroke="#00FF88" stroke-width="4" stroke-linecap="round"/>
  <line x1="75" y1="15" x2="75" y2="85" stroke="#00FF88" stroke-width="4" stroke-linecap="round"/>
  <!-- Square knobs at staggered heights -->
  <rect x="17" y="55" width="16" height="12" rx="2" fill="#00FF88"/>
  <rect x="42" y="30" width="16" height="12" rx="2" fill="#00FF88"/>
  <rect x="67" y="45" width="16" height="12" rx="2" fill="#00FF88"/>
</svg>
